  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">Nate 스포츠 — 긍정 20건 / 부정 65건 / 중립 15건</text>
  <rect x="60" y="110" width="136" height="28" fill="#27ae60" rx="3"/>
