  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "Miller's slider was nowhere near the zone — robbery"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 스포츠 — 긍정 20건 / 부정 70건 / 중립 10건</text>
