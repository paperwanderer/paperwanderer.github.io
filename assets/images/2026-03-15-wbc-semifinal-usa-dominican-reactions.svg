  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "저게 스트라이크면 야구 그만해야지, 명백한 볼인데"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">X(트위터) — 긍정 25건 / 부정 60건 / 중립 15건</text>
