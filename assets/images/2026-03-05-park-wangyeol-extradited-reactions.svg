  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 송환 환영 우세</text>
  <rect x="60" y="110" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="110" width="170" height="28" fill="#e74c3c" rx="3"/>
