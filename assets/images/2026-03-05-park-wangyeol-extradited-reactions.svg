  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "9년이 걸렸지만 결국 잡아왔다. 이번 외교 성과 하나는 인정한다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 환영 속 비판 공존</text>
  <rect x="60" y="230" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="230" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "공범 수사도 철저히 해서 유통망 전체를 뿌리 뽑아야 한다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 종합 — 긍정(환영) 우세</text>
