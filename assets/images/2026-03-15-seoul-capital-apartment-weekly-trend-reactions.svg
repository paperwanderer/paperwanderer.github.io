<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">서울 아파트 주간 동향 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">부동산 커뮤니티 · 네이버 부동산 · 경제 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">부동산 커뮤니티 — 긍정 40건 / 부정 35건 / 중립 25건</text>
  <rect x="60" y="110" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="110" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="110" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 40%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "중구·성북구 오르고 있네, 강북도 이제 기회가 있다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 부동산 — 긍정 38건 / 부정 32건 / 중립 30건</text>
  <rect x="60" y="230" width="258" height="28" fill="#27ae60" rx="3"/>
  <rect x="318" y="230" width="218" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="230" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 38%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 32%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "경기도가 서울보다 많이 오른다, 상황 바뀌었네"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">경제 커뮤니티 — 긍정 35건 / 부정 35건 / 중립 30건</text>
  <rect x="60" y="350" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="350" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="350" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "이란 전쟁 불확실성에 관망세가 늘고 있는 듯"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>