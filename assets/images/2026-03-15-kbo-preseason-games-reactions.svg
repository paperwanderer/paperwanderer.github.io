<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">KBO 시범경기 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 스포츠 · 다음 스포츠 · 야구 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 스포츠 — 긍정 55건 / 부정 10건 / 중립 35건</text>
  <rect x="60" y="110" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="110" width="68" height="28" fill="#e74c3c" rx="3"/>
  <rect x="502" y="110" width="238" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 10%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "시범경기 성적은 믿을 게 못 되지만 그래도 설레네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">다음 스포츠 — 긍정 50건 / 부정 15건 / 중립 35건</text>
  <rect x="60" y="230" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="230" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="502" y="230" width="238" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "올 시즌도 LG냐 SSG냐 싸움이 될 것 같다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">야구 커뮤니티 — 긍정 45건 / 부정 20건 / 중립 35건</text>
  <rect x="60" y="350" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="350" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="502" y="350" width="238" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "WBC에 허탈했는데 KBO 개막하면 기분 좀 풀리겠다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
