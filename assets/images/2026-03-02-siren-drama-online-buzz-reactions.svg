  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 38%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "전현무가 형사 연기를 하는 게 아직은 어색하다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">드라마 갤러리 — 긍정 52건 / 부정 35건 / 중립 13건</text>
