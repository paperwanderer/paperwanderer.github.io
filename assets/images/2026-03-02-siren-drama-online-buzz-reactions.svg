  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "스릴러 분위기 자체는 잘 잡힌 것 같다, 2화 기대된다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 48건 / 부정 38건 / 중립 14건</text>
  <rect x="60" y="230" width="326" height="28" fill="#27ae60" rx="3"/>
  <rect x="386" y="230" width="258" height="28" fill="#e74c3c" rx="3"/>
  <rect x="644" y="230" width="96" height="28" fill="#95a5a6" rx="3"/>
