  <rect x="414" y="350" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="350" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 52%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "박민영이 이 캐릭터 잘 살리는 것 같다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
