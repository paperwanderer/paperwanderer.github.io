  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 55건 / 부정 32건 / 중립 13건</text>
  <rect x="60" y="110" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="110" width="218" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="110" width="88" height="28" fill="#95a5a6" rx="3"/>
