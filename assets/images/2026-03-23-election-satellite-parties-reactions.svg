  <rect x="130" y="230" width="195" height="28" fill="#e74c3c" rx="3"/>
  <rect x="325" y="230" width="415" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 29%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 61%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "야당도 여당도 위성정당 없애겠다고 했는데 왜 또 만드는 거냐"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 60건 / 부정 210건 / 중립 410건</text>
  <rect x="60" y="350" width="60" height="28" fill="#27ae60" rx="3"/>
  <rect x="120" y="350" width="210" height="28" fill="#e74c3c" rx="3"/>
  <rect x="330" y="350" width="410" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 9%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 31%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 60%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "이준석 화성 출마 관심 가는 건 사실. 위성정당은 반대"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
