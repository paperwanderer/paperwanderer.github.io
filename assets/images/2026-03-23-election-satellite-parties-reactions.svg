  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 55건 / 부정 220건 / 중립 405건</text>
  <rect x="60" y="110" width="55" height="28" fill="#27ae60" rx="3"/>
  <rect x="115" y="110" width="220" height="28" fill="#e74c3c" rx="3"/>
  <rect x="335" y="110" width="405" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 8%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 32%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 60%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "위성정당 또 꼼수 쓰는 거잖아 진짜 질린다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 70건 / 부정 195건 / 중립 415건</text>
