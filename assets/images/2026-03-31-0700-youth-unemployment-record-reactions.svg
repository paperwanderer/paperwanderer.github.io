<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <!-- 배경 -->
  <rect width="800" height="120" fill="#f9fafb" rx="10"/>
  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="13" fill="#374151" font-family="sans-serif" font-weight="bold">청년 실업 사상 최고 — 온라인 반응 (2026-03-31 07:00 KST)</text>
  <!-- 바 배경 -->
  <rect x="60" y="35" width="680" height="32" fill="#e5e7eb" rx="6"/>
  <!-- 긍정 (5건 / 100 = 5%) → 34px -->
  <rect x="60" y="35" width="34" height="32" fill="#22c55e" rx="6"/>
  <!-- 부정 (80건 / 100 = 80%) → 544px -->
  <rect x="94" y="35" width="544" height="32" fill="#ef4444"/>
  <!-- 중립 (15건 / 100 = 15%) → 102px -->
  <rect x="638" y="35" width="102" height="32" fill="#94a3b8" rx="0 6 6 0"/>
  <!-- 긍정 라벨 -->
  <text x="60" y="85" text-anchor="start" font-size="12" fill="#16a34a" font-family="sans-serif">👍 긍정 5%</text>
  <!-- 부정 라벨 -->
  <text x="400" y="85" text-anchor="middle" font-size="12" fill="#dc2626" font-family="sans-serif">👎 부정 80%</text>
  <!-- 중립 라벨 -->
  <text x="740" y="85" text-anchor="end" font-size="12" fill="#64748b" font-family="sans-serif">중립 15%</text>
  <!-- 수치 -->
  <text x="400" y="108" text-anchor="middle" font-size="11" fill="#6b7280" font-family="sans-serif">긍정 5건 · 부정 80건 · 중립 15건 | 커뮤니티·댓글 집계 기준</text>
</svg>
