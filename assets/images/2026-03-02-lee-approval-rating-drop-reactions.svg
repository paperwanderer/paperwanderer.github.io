  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "서울 집값 떨어지면서 민심 이탈 시작된 거 아닌가"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">온라인커뮤니티 종합 — 긍정 38건 / 부정 48건 / 중립 14건</text>
