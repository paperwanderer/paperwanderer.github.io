  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">리얼미터 조사 — 긍정 57.1% / 부정 38.2% / 중립 4.7%</text>
  <rect x="60" y="110" width="388" height="28" fill="#27ae60" rx="3"/>
