  <text x="60" y="168" font-size="11" fill="#555">💬 "행정통합 지역 차별이 문제다, 왜 광주만 챙기나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 40건 / 부정 45건 / 중립 15건</text>
