  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "유가 100달러면 다 힘들어진다... 전고점 돌파 힘들 것 같다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 장기 낙관 vs 단기 불안</text>
  <rect x="60" y="230" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="230" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "반도체 실적 탄탄한 한 코스피 5,000대 유지 문제없다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 금융 댓글 — 환율 우려 상당</text>
  <rect x="60" y="350" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="350" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "환율 1,500원 넘으면 외국인 빠질까봐 걱정된다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
