<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">코스피 5400선 공방 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">주식 커뮤니티 · 클리앙 | 2026-03-25 20:30 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">주식 커뮤니티 — 긍정 95건 / 부정 110건 / 중립 45건</text>
  <rect x="60" y="110" width="258" height="28" fill="#27ae60" rx="3"/>
  <rect x="318" y="110" width="299" height="28" fill="#e74c3c" rx="3"/>
  <rect x="617" y="110" width="123" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 38%</text>
