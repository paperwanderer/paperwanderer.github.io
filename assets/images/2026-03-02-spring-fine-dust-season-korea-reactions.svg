  <text x="60" y="168" font-size="11" fill="#555">💬 "중국발 황사부터 해결해야 하는데 국내 공사장만 단속해봤자"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">환경 커뮤니티 — 긍정 25건 / 부정 60건 / 중립 15건</text>
