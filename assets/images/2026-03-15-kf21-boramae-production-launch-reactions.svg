  <text x="60" y="168" font-size="11" fill="#555">💬 "드디어 우리 손으로 만든 전투기 시대가 열렸다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 65건 / 부정 15건 / 중립 20건</text>
