  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 55% / 부정 25% / 중립 20%</text>
  <rect x="60" y="110" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="110" width="170" height="28" fill="#e74c3c" rx="3"/>
