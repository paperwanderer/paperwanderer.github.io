  <text x="60" y="168" font-size="11" fill="#555">💬 "이용제한 정도면 폭넓게 공감 — 당사자도 받아들이기 쉬운 편"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 65% / 부정 20% / 중립 15%</text>
