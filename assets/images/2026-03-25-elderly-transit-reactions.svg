  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "42년 된 제도라도 지속가능성 따져야 할 때 됐다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">X(트위터) — 긍정 60% / 부정 25% / 중립 15%</text>
