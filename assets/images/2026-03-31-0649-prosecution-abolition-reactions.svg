<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">공소청·중수청법 통과 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">뉴스 댓글 · 법조계 반응 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 뉴스 댓글: pos=50, neg=35, neu=15, total=100 -->
  <!-- pos_w=round(50/100*680)=340, neg_w=round(35/100*680)=238, neu_w=680-340-238=102 -->
  <!-- neg_x=60+340=400, neu_x=60+340+238=638 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 50건 / 부정 35건 / 중립 15건</text>
  <rect x="60"  y="110" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="110" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "드디어 됐다. 수사·기소 모두 쥐는 건 민주주의 원칙에 어긋난다"</text>

  <!-- 법조계 반응: pos=30, neg=45, neu=25, total=100 -->
  <!-- pos_w=round(30/100*680)=204, neg_w=round(45/100*680)=306, neu_w=680-204-306=170 -->
  <!-- neg_x=60+204=264, neu_x=60+204+306=570 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">법조계 반응 — 긍정 30건 / 부정 45건 / 중립 25건</text>
  <rect x="60"  y="230" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "중수청이 행안부 소속이면 경찰의 아류가 된다는 우려"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
