  <text x="60" y="168" font-size="11" fill="#555">💬 "이런 법이 진작에 있었어야 했다. 가족 돌보느라 자기 인생 희생하는 청년들 너무 많다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 170건 / 부정 8건 / 중립 172건</text>
