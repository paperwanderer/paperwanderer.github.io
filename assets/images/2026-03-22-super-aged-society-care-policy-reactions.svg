<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">초고령사회 의료·돌봄 정책 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 뉴스 · 에펨코리아 · 더쿠 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 480건 / 부정 150건 / 중립 170건</text>
  <rect x="60" y="110" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="110" width="128" height="28" fill="#e74c3c" rx="3"/>
  <rect x="596" y="110" width="144" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 19%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 21%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "집에서 돌봄 받을 수 있다니 부모님 걱정 덜었다" (공감 278)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 260건 / 부정 140건 / 중립 100건</text>
  <rect x="60" y="230" width="354" height="28" fill="#27ae60" rx="3"/>
  <rect x="414" y="230" width="190" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 52%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 28%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "건강보험료 또 올리는 거잖아, 20대는 돈 내기만 함?" (공감 122)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">더쿠(theqoo) — 긍정 300건 / 부정 100건 / 중립 100건</text>
  <rect x="60" y="350" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="350" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "노인 돌봄을 가족에게만 미루는 시대가 끝나야 한다" (공감 189)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>