  <text x="60" y="168" font-size="11" fill="#555">💬 "대전 화재 사고 대응 보면서 오히려 국정 리더십이 보임"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 320건 / 부정 80건 / 중립 60건</text>
