  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "그알 사과도 받아냈고 지지율 최고치. 올해 가장 좋은 날인 듯"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스댓글 — 긍정 360건 / 부정 280건 / 중립 80건</text>
