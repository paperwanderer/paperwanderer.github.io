<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">호르무즈 해협 봉쇄 — 한국 경제 영향 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">브랜드경제 · 클리앙 · 에코노믹스 | 2026-03-13 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">브랜드경제 댓글 — 우려 없음 5건 / 우려 80건 / 중립 15건</text>
  <rect x="60" y="110" width="34" height="28" fill="#27ae60" rx="3"/>
  <rect x="94" y="110" width="544" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 5%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 80%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "원유 95%가 호르무즈 통과하는데 대책이 있긴 한가"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 우려 없음 8건 / 우려 75건 / 중립 17건</text>
  <rect x="60" y="230" width="54" height="28" fill="#27ae60" rx="3"/>
  <rect x="114" y="230" width="510" height="28" fill="#e74c3c" rx="3"/>
  <rect x="624" y="230" width="116" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 8%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 75%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "에너지 자립도 0%에 가까운 나라가 전쟁 여파를 직격으로 맞는다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">에코노믹스 — 우려 없음 10건 / 우려 72건 / 중립 18건</text>
  <rect x="60" y="350" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="350" width="490" height="28" fill="#e74c3c" rx="3"/>
  <rect x="618" y="350" width="122" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 72%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "IEA 비축유 4.2억 배럴 풀어도 유가 100달러 넘는 현실"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>