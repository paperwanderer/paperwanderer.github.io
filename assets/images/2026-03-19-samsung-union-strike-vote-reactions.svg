<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">삼성전자 노조 파업 찬반투표 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">공동투쟁본부 · 온라인 커뮤니티 · 주주/외부 | 2026-03-19 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">조합원 찬반투표 — 찬성 61,456건 / 반대 4,563건</text>
  <rect x="60" y="110" width="629" height="28" fill="#27ae60" rx="3"/>
  <rect x="689" y="110" width="47" height="28" fill="#e74c3c" rx="3"/>
  <rect x="736" y="110" width="4" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 92%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 1%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "성과급 상한 폐지 당연히 찬성, 우리도 SK처럼 받아야"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 긍정 40건 / 부정 45건 / 중립 15건</text>
  <rect x="60" y="230" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 40%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "연봉 1.6억에 성과급까지 올려달라고? 공감 안 가"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">주주·외부 시각 — 긍정 25건 / 부정 60건 / 중립 15건</text>
  <rect x="60" y="350" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="350" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "파업하면 9조 손실 글로벌 반도체 공급망 우려"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>