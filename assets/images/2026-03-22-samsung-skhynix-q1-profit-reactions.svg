  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "1분기 합산 70조면 반도체 슈퍼사이클 찐으로 왔다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 150건 / 부정 25건 / 중립 65건</text>
