  <rect x="564" y="230" width="176" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 64%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 11%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "SK하이닉스 HBM 독점 구조 유지되는 동안은 실적 꺾이기 어렵다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 200건 / 부정 20건 / 중립 60건</text>
