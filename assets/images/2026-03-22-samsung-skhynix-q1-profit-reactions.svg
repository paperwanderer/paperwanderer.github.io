  <rect x="547" y="350" width="49" height="28" fill="#e74c3c" rx="3"/>
  <rect x="596" y="350" width="144" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 72%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 21%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "주가는 왜 떨어지는지, 실적과 주가 따로 노는 거 이해 안 됨"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
