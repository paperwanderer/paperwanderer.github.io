<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <rect width="800" height="160" fill="#f8f9fa" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">커뮤니티 반응 온도계 — 미세먼지 31% 급증</text>
  <text x="400" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">집계 기준: 2026-03-31 07:00 KST | 총 반응 100건 추산</text>

  <!-- bar background -->
  <rect x="60" y="62" width="680" height="36" fill="#e0e0e0" rx="6"/>
  <!-- pos: 10/100 * 680 = 68 -->
  <rect x="60" y="62" width="68" height="36" fill="#4caf50" rx="6"/>
  <!-- neg: 75/100 * 680 = 510 -->
  <rect x="128" y="62" width="510" height="36" fill="#f44336"/>
  <!-- neu: 680 - 68 - 510 = 102 -->
  <rect x="638" y="62" width="102" height="36" fill="#9e9e9e" rx="6"/>

  <!-- labels on bar -->
  <text x="94" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">긍정 10%</text>
  <text x="383" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">부정 75%</text>
  <text x="689" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">중립 15%</text>

  <!-- bottom labels -->
  <text x="60" y="120" text-anchor="start" font-family="sans-serif" font-size="12" fill="#4caf50">👍 긍정 — 마스크 생활화 수용</text>
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f44336">👎 부정 — 건강·야외활동 불만</text>
  <text x="740" y="120" text-anchor="end" font-family="sans-serif" font-size="12" fill="#9e9e9e">💬 중립 — 관망</text>

  <text x="400" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">출처: FM코리아·에어코리아 댓글 추산</text>
</svg>
