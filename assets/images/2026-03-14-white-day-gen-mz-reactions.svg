  <text x="60" y="168" font-size="11" fill="#555">💬 "사탕보다 분위기 있는 데이트 한 번이 훨씬 낫다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">DC인사이드 — 긍정 180건 / 부정 120건 / 중립 100건</text>
