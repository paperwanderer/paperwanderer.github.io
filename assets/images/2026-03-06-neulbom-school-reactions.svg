  <text x="60" y="168" font-size="11" fill="#555">💬 "교사가 돌봄까지 담당하는 구조 자체가 말이 안 됨"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 28건 / 부정 62건 / 중립 39건</text>
