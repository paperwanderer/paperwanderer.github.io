  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 34건 / 부정 89건 / 중립 44건</text>
  <rect x="60" y="110" width="138" height="28" fill="#27ae60" rx="3"/>
