<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">방산주 급등 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버뉴스 · 주식 커뮤니티 | 2026-03-05 20:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정(수익·자부심) 우세</text>
  <rect x="60" y="110" width="489" height="28" fill="#27ae60" rx="3"/>
  <rect x="549" y="110" width="54" height="28" fill="#e74c3c" rx="3"/>
  <rect x="603" y="110" width="137" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 72%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "코스피 폭락장에서 방산주만 살아있다. 진짜 전쟁 테마는 다르네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">주식 커뮤니티 — 수익 인증 활발</text>
  <rect x="60" y="230" width="530" height="28" fill="#27ae60" rx="3"/>
  <rect x="590" y="230" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="624" y="230" width="116" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 78%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "천궁-II가 UAE에서 이란 미사일 막았다니, 한국 방산 위상이 달라졌다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 종합 — 긍정 압도</text>
  <rect x="60" y="350" width="503" height="28" fill="#27ae60" rx="3"/>
  <rect x="563" y="350" width="47" height="28" fill="#e74c3c" rx="3"/>
  <rect x="610" y="350" width="130" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 74%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 19%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "전쟁 날 때 웃는 주식이라는 말이 씁쓸하긴 하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
