<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">신현송 한은 총재 후보 지명 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 네이버뉴스댓글 · 클리앙 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 60건 / 부정 15건 / 중립 25건</text>
  <rect x="60" y="110" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="110" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="110" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "BIS에서 글로벌 금융 다루던 석학... 진짜 적재적소에 뽑았다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스댓글 — 긍정 55건 / 부정 20건 / 중립 25건</text>
  <rect x="60" y="230" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="230" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "노벨상 후보 거론된 분 오시는거면 한은 위상이 높아지겠네요"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 50건 / 부정 20건 / 중립 30건</text>
  <rect x="60" y="350" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="350" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="350" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "매파 성향이라 금리 인상 가능성 주시해야 할 것 같다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
