<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">호르무즈 해협 위기 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 네이버 뉴스 댓글 | 2026-03-21 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 에너지 위기 토론</text>
  <rect x="60" y="110" width="240" height="28" fill="#27ae60" rx="3"/>
  <rect x="300" y="110" width="300" height="28" fill="#e74c3c" rx="3"/>
  <rect x="600" y="110" width="140" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 44%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 21%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "재생에너지 전환을 왜 안 했냐. 이게 언제까지 반복될 건지"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — IT·관심사 커뮤니티 반응</text>
  <rect x="60" y="230" width="200" height="28" fill="#27ae60" rx="3"/>
  <rect x="260" y="230" width="280" height="28" fill="#e74c3c" rx="3"/>
  <rect x="540" y="230" width="200" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 29%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 41%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "200일 비축이면 버텨야지. 그래도 빠른 대응이었다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 호르무즈 관련 기사</text>
  <rect x="60" y="350" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="350" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "에너지 자립도를 높여야 한다는 건 10년 전부터 하던 말"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>