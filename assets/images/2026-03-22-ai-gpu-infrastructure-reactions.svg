  <text x="60" y="168" font-size="11" fill="#555">💬 "블랙웰 넘어 베라루빈까지 포함하는 계획, 방향은 맞다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 120건 / 부정 25건 / 중립 55건</text>
