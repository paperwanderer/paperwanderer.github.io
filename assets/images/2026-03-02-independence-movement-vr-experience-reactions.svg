  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "역사를 이렇게 배우면 더 오래 기억에 남을 것 같다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">역사 커뮤니티 — 긍정 65건 / 부정 20건 / 중립 15건</text>
