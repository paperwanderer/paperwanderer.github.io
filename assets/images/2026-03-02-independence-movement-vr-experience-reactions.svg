  <text x="60" y="168" font-size="11" fill="#555">💬 "VR로 1919년 시위 현장에 있는 것 같았다, 소름 돋았다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 70건 / 부정 15건 / 중립 15건</text>
