<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">서울 휘발유 1900원 돌파 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버뉴스 · FM코리아 | 2026-03-29 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 네이버뉴스 bar_y=110 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 긍정 8건 / 부정 310건 / 중립 82건</text>
  <rect x="60" y="110" width="16" height="28" fill="#27ae60" rx="3"/>
  <rect x="76" y="110" width="527" height="28" fill="#e74c3c" rx="3"/>
  <rect x="603" y="110" width="137" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 2%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 78%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "최고가제가 1934원이면 최고가제가 아니지, 이게 무슨 의미가 있냐"</text>

  <!-- FM코리아 bar_y=230 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 긍정 5건 / 부정 120건 / 중립 75건</text>
  <rect x="60" y="230" width="17" height="28" fill="#27ae60" rx="3"/>
  <rect x="77" y="230" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="485" y="230" width="255" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 3%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 37%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "2000원 되면 진짜 자전거 타야겠다"</text>

  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
