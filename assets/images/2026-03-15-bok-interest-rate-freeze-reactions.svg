<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">기준금리 동결 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">투자 커뮤니티 · 네이버 뉴스 · 부동산 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">투자 커뮤니티 — 긍정 30건 / 부정 40건 / 중립 30건</text>
  <rect x="60" y="110" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="110" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="110" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "더 내릴 줄 알았는데 아쉽다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 35건 / 부정 30건 / 중립 35건</text>
  <rect x="60" y="230" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="230" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="502" y="230" width="238" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "2.75%면 이미 충분히 낮다고 생각한다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">부동산 커뮤니티 — 긍정 25건 / 부정 50건 / 중립 25건</text>
  <rect x="60" y="350" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="350" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="350" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "물가 잡히고 있으니 인내심 갖고 기다리자"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
