  <rect x="140" y="230" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="616" y="230" width="124" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "환율이 1,500원 넘으면 물가 진짜 더 오르는 거 아닌가"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 공감 136건 / 비공감 408건 / 중립 136건</text>
  <rect x="60" y="350" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="350" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "뉴노멀 됐다고 생각해야 할 것 같다. 대비가 필요한 시점"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
