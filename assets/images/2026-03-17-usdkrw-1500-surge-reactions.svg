  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "IMF 때 기억하는 부모님들 또 불안해하시겠다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 공감 80건 / 비공감 476건 / 중립 124건</text>
