  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "서울 공시가 18% 오르면 종부세 대상 아파트 수십만 채 늘어나는 거잖아"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 긍정 22건 / 부정 82건 / 중립 46건</text>
  <rect x="60" y="230" width="100" height="28" fill="#27ae60" rx="3"/>
  <rect x="160" y="230" width="372" height="28" fill="#e74c3c" rx="3"/>
  <rect x="532" y="230" width="208" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "집값 올랐다고 내가 소득 오른 게 아닌데 세금만 더 내야 함"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">보배드림 — 긍정 15건 / 부정 72건 / 중립 43건</text>
  <rect x="60" y="350" width="78" height="28" fill="#27ae60" rx="3"/>
  <rect x="138" y="350" width="377" height="28" fill="#e74c3c" rx="3"/>
  <rect x="515" y="350" width="225" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 11%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 34%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "강남 아파트값 올라서 세금 더 내는 건 당연한 거 아님? 가진 자들의 볼멘소리"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
