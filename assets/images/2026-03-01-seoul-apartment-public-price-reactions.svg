  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버부동산 — 긍정 18건 / 부정 95건 / 중립 37건</text>
  <rect x="60" y="110" width="82" height="28" fill="#27ae60" rx="3"/>
  <rect x="142" y="110" width="431" height="28" fill="#e74c3c" rx="3"/>
  <rect x="573" y="110" width="167" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
