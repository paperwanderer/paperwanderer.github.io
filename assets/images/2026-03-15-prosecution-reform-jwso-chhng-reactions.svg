  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 48건 / 부정 37건 / 중립 15건</text>
  <rect x="60" y="110" width="326" height="28" fill="#27ae60" rx="3"/>
