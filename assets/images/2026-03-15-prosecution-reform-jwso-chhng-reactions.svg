  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "공소청이 제대로 독립성 가질 수 있을지가 관건"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">MBC 뉴스 — 긍정 45건 / 부정 40건 / 중립 15건</text>
