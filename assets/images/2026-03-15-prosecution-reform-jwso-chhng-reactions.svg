  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "검찰이 수사와 기소를 다 쥐고 있는 건 권력 집중이었다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">정치 커뮤니티 — 긍정 50건 / 부정 35건 / 중립 15건</text>
  <rect x="60" y="230" width="340" height="28" fill="#27ae60" rx="3"/>
