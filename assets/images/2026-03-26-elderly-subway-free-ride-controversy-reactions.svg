  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 실베 — 추천 92건 / 비추천 12건 / 기타 285건</text>
  <rect x="60" y="110" width="161" height="28" fill="#27ae60" rx="3"/>
