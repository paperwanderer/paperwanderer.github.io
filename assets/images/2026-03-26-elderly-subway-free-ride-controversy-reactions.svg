  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이준석 때는 노인 차별이라 하더니…이재명이 하니까 사회적 논의?"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">루리웹 — 긍정 30건 / 부정 50건 / 중립 40건</text>
