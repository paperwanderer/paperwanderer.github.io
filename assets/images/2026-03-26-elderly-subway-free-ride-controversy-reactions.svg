  <text x="60" y="168" font-size="11" fill="#555">💬 "노인 차별이 아니라 노인 외에 모두 차별이지"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 180건 / 부정 40건 / 중립 120건</text>
