  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">디시인사이드 · 에펨코리아 · 루리웹 | 2026-03-26 18:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
