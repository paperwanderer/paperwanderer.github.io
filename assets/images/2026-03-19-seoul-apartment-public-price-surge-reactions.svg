<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">서울 공시가격 18% 급등 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">부동산 커뮤니티 · 뉴스 댓글 · 전문가 | 2026-03-19 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">세입자·서민층 — 긍정 10건 / 부정 70건 / 중립 20건</text>
  <rect x="60" y="110" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "결국 월세 올려서 보유세 내야죠 세입자 피해"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">부동산 투자자 — 긍정 45건 / 부정 45건 / 중립 10건</text>
  <rect x="60" y="230" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "집값 오른 게 반영된 것 뿐 세금은 내야지"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">언론·전문가 — 긍정 30건 / 부정 55건 / 중립 15건</text>
  <rect x="60" y="350" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="350" width="374" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "강남만 올랐는데 건보료는 전국이 오른다 문제"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
