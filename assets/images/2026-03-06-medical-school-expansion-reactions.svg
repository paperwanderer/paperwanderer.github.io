  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "의사 부족 문제 실제로 심각한데 증원은 해야 함"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 74건 / 부정 28건 / 중립 39건</text>
  <rect x="60" y="230" width="357" height="28" fill="#27ae60" rx="3"/>
  <rect x="417" y="230" width="135" height="28" fill="#e74c3c" rx="3"/>
  <rect x="552" y="230" width="188" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 52%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "지방 필수의료 붕괴는 실제 문제, 의협이 밥그릇 지키는 것"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 143건 / 부정 47건 / 중립 58건</text>
  <rect x="60" y="350" width="392" height="28" fill="#27ae60" rx="3"/>
  <rect x="452" y="350" width="129" height="28" fill="#e74c3c" rx="3"/>
  <rect x="581" y="350" width="159" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 58%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 19%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "숫자만 늘린다고 지방 의료가 해결되냐는 의협 주장도 들어야"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
