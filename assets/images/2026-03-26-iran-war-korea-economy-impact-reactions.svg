  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 20건 / 부정 120건 / 중립 200건</text>
  <rect x="60" y="110" width="40" height="28" fill="#27ae60" rx="3"/>
