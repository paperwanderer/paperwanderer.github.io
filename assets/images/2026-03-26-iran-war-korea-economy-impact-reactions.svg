  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 38%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "코스피 5,400선 무너지면 진짜 위험 신호 아닌가"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 긍정 25건 / 부정 95건 / 중립 80건</text>
