  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 59%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "전쟁 한 달도 안 돼서 이 정도면 장기화되면 진짜 큰일"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 15건 / 부정 85건 / 중립 60건</text>
