  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 16%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "원동 매화축제 다녀왔는데 진짜 너무 예뻤다 내년에도 꼭 가야겠다" (공감 246)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙/여행커뮤니티 — 긍정 340건 / 부정 70건 / 중립 210건</text>
  <rect x="60" y="230" width="378" height="28" fill="#27ae60" rx="3"/>
  <rect x="438" y="230" width="78" height="28" fill="#e74c3c" rx="3"/>
  <rect x="516" y="230" width="224" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 56%</text>
