  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 33%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "고환율이라 제주 국내 여행이 오히려 경제적이다 이번 주 제주 갈 예정" (공감 156)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 합산 — 긍정 920건 / 부정 180건 / 중립 340건</text>
  <rect x="60" y="350" width="434" height="28" fill="#27ae60" rx="3"/>
  <rect x="494" y="350" width="85" height="28" fill="#e74c3c" rx="3"/>
  <rect x="579" y="350" width="161" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 64%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 12%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 24%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "3월 봄 여행이 4월보다 훨씬 한가해서 좋다 올해도 창경궁 다녀왔음" (공감 198)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
