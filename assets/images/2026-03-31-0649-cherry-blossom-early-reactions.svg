<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">서울 벚꽃 조기 개화 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">SNS·커뮤니티 · 여행·나들이 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- SNS·커뮤니티: pos=80, neg=10, neu=10, total=100 -->
  <!-- pos_w=round(80/100*680)=544, neg_w=round(10/100*680)=68, neu_w=680-544-68=68 -->
  <!-- neg_x=60+544=604, neu_x=60+544+68=672 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">SNS·커뮤니티 — 긍정 80건 / 부정 10건 / 중립 10건</text>
  <rect x="60"  y="110" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="110" width="68"  height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68"  height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 10%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "벚꽃 이미 폈다고?! 이번 주말 여의도 각이다"</text>

  <!-- 여행·나들이 커뮤니티: pos=70, neg=15, neu=15, total=100 -->
  <!-- pos_w=round(70/100*680)=476, neg_w=round(15/100*680)=102, neu_w=680-476-102=102 -->
  <!-- neg_x=60+476=536, neu_x=60+476+102=638 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">여행·나들이 커뮤니티 — 긍정 70건 / 부정 15건 / 중립 15건</text>
  <rect x="60"  y="230" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="230" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "석촌호수 롯데월드 주변 벚꽃이 진짜 예쁘다. 4월 첫째 주가 절정"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
