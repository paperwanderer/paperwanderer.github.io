  <text x="60" y="168" font-size="11" fill="#555">💬 "김근태는 64세에 죽었는데 이근안은 88세까지 살았다"</text>

  <!-- FM코리아 bar_y=230 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 긍정 8건 / 부정 92건 / 중립 50건</text>
  <rect x="60" y="230" width="36" height="28" fill="#27ae60" rx="3"/>
