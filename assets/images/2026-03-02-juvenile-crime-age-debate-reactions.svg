<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">촉법소년 연령 하향 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">리얼미터 · 네이버뉴스댓글 · 전문가커뮤니티 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">리얼미터 여론조사 — 찬성 70% / 반대 18% / 중립 12%</text>
  <rect x="60" y="110" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="110" width="122" height="28" fill="#e74c3c" rx="3"/>
  <rect x="658" y="110" width="82" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 18%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "피해자 가족들 억울함이 먼저다, 가해자 인권만 챙기지 말아라"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 찬성 72건 / 반대 15건 / 중립 13건</text>
  <rect x="60" y="230" width="490" height="28" fill="#27ae60" rx="3"/>
  <rect x="550" y="230" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="230" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 72%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "13살도 충분히 죄의식 있다, 처벌 받아야 한다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전문가 커뮤니티 — 찬성 30건 / 반대 52건 / 중립 18건</text>
  <rect x="60" y="350" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="350" width="354" height="28" fill="#e74c3c" rx="3"/>
  <rect x="618" y="350" width="122" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 52%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "처벌 강화보다 교육과 재활이 먼저, 낙인찍기로 해결 안 된다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>