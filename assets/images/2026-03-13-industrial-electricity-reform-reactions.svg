<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">산업용 전기요금 개편 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 뉴스 댓글 · 클리앙 · 디시인사이드 | 2026-03-13 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 360건 / 부정 120건 / 중립 200건</text>
  <rect x="60" y="110" width="360" height="28" fill="#27ae60" rx="3"/>
  <rect x="420" y="110" width="120" height="28" fill="#e74c3c" rx="3"/>
  <rect x="540" y="110" width="200" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 53%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 18%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 29%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "49년 만의 개편이라니 진작 했어야지. 낮에 공장 돌리면 요금 내려가나요?"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 350건 / 부정 90건 / 중립 240건</text>
  <rect x="60" y="230" width="350" height="28" fill="#27ae60" rx="3"/>
  <rect x="410" y="230" width="90" height="28" fill="#e74c3c" rx="3"/>
  <rect x="500" y="230" width="240" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 51%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 13%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 36%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "재생에너지 확대에 맞는 합리적 조정. 반도체 업계 야간 부담 해결 필요."</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 280건 / 부정 200건 / 중립 200건</text>
  <rect x="60" y="350" width="280" height="28" fill="#27ae60" rx="3"/>
  <rect x="340" y="350" width="200" height="28" fill="#e74c3c" rx="3"/>
  <rect x="540" y="350" width="200" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 41%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 29%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "야간 인상은 24시간 공장에 타격 ㄹㅇ. 반도체 팹은 무조건 손해"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>