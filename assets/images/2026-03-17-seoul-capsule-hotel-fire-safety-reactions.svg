<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">캡슐호텔 화재 안전점검 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 더쿠 · 네이버뉴스 | 2026-03-17 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 공감 374건 / 비공감 170건 / 중립 136건</text>
  <rect x="60" y="110" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="110" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 25%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "캡슐호텔 특성상 화재 나면 탈출이 정말 어렵겠다. 규제가 더 엄격해야 한다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 공감 408건 / 비공감 136건 / 중립 136건</text>
  <rect x="60" y="230" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="230" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "BTS 공연 때문에 외국인 많이 오는데 이런 사고 나면 이미지 타격이 크다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 공감 340건 / 비공감 204건 / 중립 136건</text>
  <rect x="60" y="350" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="350" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "사고 나고 나서야 점검하는 게 문제다. 사전 예방이 없었다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>