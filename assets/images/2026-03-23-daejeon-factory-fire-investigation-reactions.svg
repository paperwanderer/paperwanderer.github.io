  <text x="60" y="168" font-size="11" fill="#555">💬 "이게 나라냐 안전불감증이 얼마나 심하면 이렇게 되냐"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 60건 / 부정 95건 / 중립 30건</text>
