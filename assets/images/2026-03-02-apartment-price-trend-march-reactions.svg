  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">강북권 투자자 — 긍정 75건 / 부정 10건 / 중립 15건</text>
  <rect x="60" y="110" width="510" height="28" fill="#27ae60" rx="3"/>
  <rect x="570" y="110" width="68" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
