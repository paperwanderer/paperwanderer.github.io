  <text x="60" y="168" font-size="11" fill="#555">💬 "강북 역세권 샀던 거 신의 한 수, 강남 재건축보다 낫네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 42건 / 부정 43건 / 중립 15건</text>
