  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "집 없는 사람만 계속 죽어나간다, 전세도 오르고 매매도 오르고"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">무주택자 반응 — 긍정 12건 / 부정 73건 / 중립 15건</text>
