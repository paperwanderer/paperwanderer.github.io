<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">미국 301조 조사 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">뉴스 댓글 · 경제 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 뉴스 댓글: pos=15, neg=55, neu=30, total=100 -->
  <!-- pos_w=round(15/100*680)=102, neg_w=round(55/100*680)=374, neu_w=680-102-374=204 -->
  <!-- neg_x=60+102=162, neu_x=60+102+374=536 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 15건 / 부정 55건 / 중립 30건</text>
  <rect x="60"  y="110" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="110" width="374" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="110" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "트럼프는 약속을 안 지키기로 유명. 관세 협정도 언제 뒤집힐지 모른다"</text>

  <!-- 경제 커뮤니티: pos=20, neg=50, neu=30, total=100 -->
  <!-- pos_w=round(20/100*680)=136, neg_w=round(50/100*680)=340, neu_w=680-136-340=204 -->
  <!-- neg_x=60+136=196, neu_x=60+136+340=536 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">경제 커뮤니티 — 긍정 20건 / 부정 50건 / 중립 30건</text>
  <rect x="60"  y="230" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="230" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="230" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "자동차 수출 13.5% 줄었다. 현대·기아 미국 현지 생산 비중 더 늘려야"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
