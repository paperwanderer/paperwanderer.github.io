  <text x="60" y="168" font-size="11" fill="#555">💬 "기름값 1,800원이면 자가용 출퇴근하는 사람들 진짜 힘들다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 지지 68건 / 고통호소 544건 / 중립 68건</text>
