  <rect x="196" y="350" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "비축유 빨리 풀어줘야 한다. 정부 행동이 너무 느리다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
