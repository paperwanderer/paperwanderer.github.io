  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "삼성이 엔비디아도 AMD도 다 잡았다. HBM 시장 반등 드디어 시작" (공감 387)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 420건 / 부정 35건 / 중립 45건</text>
  <rect x="60" y="230" width="571" height="28" fill="#27ae60" rx="3"/>
  <rect x="631" y="230" width="48" height="28" fill="#e74c3c" rx="3"/>
  <rect x="679" y="230" width="61" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 84%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 9%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "파인먼이 1nm 공정이면 삼성 파운드리 다시 살아나는 것 아닌가요?" (공감 210)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">주식 커뮤니티(종합) — 긍정 600건 / 부정 50건 / 중립 30건</text>
  <rect x="60" y="350" width="600" height="28" fill="#27ae60" rx="3"/>
  <rect x="660" y="350" width="50" height="28" fill="#e74c3c" rx="3"/>
  <rect x="710" y="350" width="30" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 88%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 5%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "코스피 5925 찍었다. GTC 효과 실화냐, 내일도 오를 것 같다" (공감 298)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
