<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">삼성 vs SK하이닉스 HBM — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 루리웹 | 2026-03-17 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — SK하이닉스 응원 340건 / 회의 204건 / 중립 136건</text>
  <rect x="60" y="110" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="110" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "SK하이닉스가 지금 앞서지만 삼성 파운드리+메모리 결합이 실현되면 판 바뀐다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 기대 408건 / 회의 136건 / 중립 136건</text>
  <rect x="60" y="230" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="230" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "둘 다 잘돼야 한국 경제가 버티는 거 아닌가. 경쟁하되 공멸은 안 돼"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">루리웹 — 기대 272건 / 회의 272건 / 중립 136건</text>
  <rect x="60" y="350" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="350" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 40%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "중국이 따라오는 속도가 더 큰 위협이다. 대미·대중 수출 규제도 변수"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>