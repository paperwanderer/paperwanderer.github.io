<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">코스피 반등·이란 협상 기대 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 아시아경제 댓글 | 2026-03-10 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 62건 / 부정 98건 / 중립 40건</text>
  <rect x="60" y="110" width="211" height="28" fill="#27ae60" rx="3"/>
  <rect x="271" y="110" width="333" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 31%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 49%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "하루만에 오른다고 끝이 아님... 이란 전쟁 아직 진행 중" (공감 178)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 45건 / 부정 30건 / 중립 25건</text>
  <rect x="60" y="230" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="230" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "트럼프 발언 하나에 시장이 이렇게 움직인다는 게... 불안하다" (공감 67)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">아시아경제 댓글 — 긍정 55건 / 부정 35건 / 중립 10건</text>
  <rect x="60" y="350" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="350" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "코스피 3% 반등, 어제 패닉에 던진 사람들 후회하겠다" (공감 92)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>