<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">트럼프 관세 판결 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">포털뉴스 · 경제커뮤니티 · 투자자 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 52건 / 부정 36건 / 중립 12건</text>
  <rect x="60" y="110" width="354" height="28" fill="#27ae60" rx="3"/>
  <rect x="414" y="110" width="245" height="28" fill="#e74c3c" rx="3"/>
  <rect x="659" y="110" width="81" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 52%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 36%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "대법원 판결 나왔으니 당장은 숨통이 트였다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">경제 커뮤니티 — 긍정 40건 / 부정 45건 / 중립 15건</text>
  <rect x="60" y="230" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 40%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "301조로 또 압박 들어오면 소용없다, 핵심 수출품목 다 잡혀있다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">투자자 커뮤니티 — 긍정 45건 / 부정 42건 / 중립 13건</text>
  <rect x="60" y="350" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="350" width="286" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="350" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 42%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "환율이 좀 내려가길 기대한다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>