  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "208일치 비축유가 있다지만 진짜로 봉쇄되면 몇 주?"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 30건 / 부정 180건 / 중립 50건</text>
  <rect x="60" y="230" width="78" height="28" fill="#27ae60" rx="3"/>
  <rect x="138" y="230" width="471" height="28" fill="#e74c3c" rx="3"/>
  <rect x="609" y="230" width="131" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 11%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 69%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "탈원전 논쟁보다 에너지 다변화가 훨씬 시급한 문제"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 50건 / 부정 280건 / 중립 70건</text>
  <rect x="60" y="350" width="85" height="28" fill="#27ae60" rx="3"/>
  <rect x="145" y="350" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="621" y="350" width="119" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "LNG 40% 폭등... 전기요금·가스요금 줄줄이 오르겠다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
