  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 47%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "국내 저감 정책 아무리 해봤자 중국발 황사는 통제 불가능한 것" (비공감 122)</text>

