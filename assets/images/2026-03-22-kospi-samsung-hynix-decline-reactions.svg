<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">코스피·삼성·하이닉스 급락 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 디시인사이드 · 네이버뉴스댓글 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 10건 / 부정 70건 / 중립 20건</text>
  <rect x="60" y="110" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "코스피 이렇게 빠지면 국민연금도 손실 엄청난 거 아닌가"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 10건 / 부정 68건 / 중립 22건</text>
  <rect x="60" y="230" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="230" width="462" height="28" fill="#e74c3c" rx="3"/>
  <rect x="590" y="230" width="150" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "삼전 -13% 하닉 -20% 3일만에... 저가 매수 기회라는 말도 있는데 겁난다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스댓글 — 긍정 12건 / 부정 65건 / 중립 23건</text>
  <rect x="60" y="350" width="82" height="28" fill="#27ae60" rx="3"/>
  <rect x="142" y="350" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="584" y="350" width="156" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "외국인 대규모 매도에 개인만 버티는 꼴... 언제 반등하냐"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>