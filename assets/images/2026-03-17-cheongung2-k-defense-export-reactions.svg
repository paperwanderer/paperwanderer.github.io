  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "전쟁 중인 지역에 무기 수출이 맞냐. 경제적 이익만 보면 안 된다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 기대 408건 / 우려 204건 / 중립 68건</text>
