  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "경제 어려운 때 방산 수출이라도 잘 되면 다행이다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 기대 340건 / 우려 204건 / 중립 136건</text>
