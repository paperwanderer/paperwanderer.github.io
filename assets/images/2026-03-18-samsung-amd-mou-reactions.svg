<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">삼성전자-AMD MOU — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 주식 커뮤니티 | 2026-03-18 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 640건 / 부정 45건 / 중립 115건</text>
  <rect x="60" y="110" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="110" width="38" height="28" fill="#e74c3c" rx="3"/>
  <rect x="642" y="110" width="98" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 6%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "삼성이 엔비디아도 AMD도 다 잡았다. HBM 시장 반등 드디어 시작" (공감 342)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 340건 / 부정 27건 / 중립 33건</text>
  <rect x="60" y="230" width="578" height="28" fill="#27ae60" rx="3"/>
  <rect x="638" y="230" width="46" height="28" fill="#e74c3c" rx="3"/>
  <rect x="684" y="230" width="56" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 85%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 7%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 8%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이재용 회장 리사수 만났다. 파운드리까지 가면 대박" (공감 231)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">주식 커뮤니티 — 긍정 600건 / 부정 55건 / 중립 25건</text>
  <rect x="60" y="350" width="600" height="28" fill="#27ae60" rx="3"/>
  <rect x="660" y="350" width="55" height="28" fill="#e74c3c" rx="3"/>
  <rect x="715" y="350" width="25" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 88%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 4%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "AMD MI455X에 HBM4 독점공급 확정이면 물량 엄청날 듯" (공감 178)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>