  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "주저앉는 거 보고 심장 쫄렸다. 일본전까지 있는데 제발 괜찮아야"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">야구 커뮤니티 — 우려 속 안도</text>
  <rect x="60" y="230" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
