  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "태블릿 충전 관리에 AS까지 교사가 다 해야 하냐"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">오마이뉴스 독자 — 긍정 18건 / 부정 74건 / 중립 33건</text>
  <rect x="60" y="230" width="98" height="28" fill="#27ae60" rx="3"/>
  <rect x="158" y="230" width="402" height="28" fill="#e74c3c" rx="3"/>
  <rect x="560" y="230" width="180" height="28" fill="#95a5a6" rx="3"/>
