  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 59%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "2026년 AI 교과서? 교사는 슈퍼맨이 되어야 하나요"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 41건 / 부정 88건 / 중립 49건</text>
  <rect x="60" y="350" width="157" height="28" fill="#27ae60" rx="3"/>
  <rect x="217" y="350" width="336" height="28" fill="#e74c3c" rx="3"/>
  <rect x="553" y="350" width="187" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 23%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 49%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "AI 교과서 방향은 맞지만 현장 준비가 너무 부족"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
