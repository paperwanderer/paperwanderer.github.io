  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 29건 / 부정 68건 / 중립 41건</text>
  <rect x="60" y="110" width="143" height="28" fill="#27ae60" rx="3"/>
  <rect x="203" y="110" width="335" height="28" fill="#e74c3c" rx="3"/>
  <rect x="538" y="110" width="202" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 21%</text>
