  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "개막도 안 했는데 야구장이 이 정도면 올해 흥행 제대로 터진 거 아님?"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버스포츠 — 긍정 180건 / 부정 10건 / 중립 30건</text>
  <rect x="60" y="230" width="561" height="28" fill="#27ae60" rx="3"/>
  <rect x="621" y="230" width="31" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="230" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 82%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "22일 일요일 8만3천명 신기록 ㄷㄷ 야구 황금기 왔다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">커뮤니티 종합 — 긍정 250건 / 부정 12건 / 중립 38건</text>
  <rect x="60" y="350" width="566" height="28" fill="#27ae60" rx="3"/>
  <rect x="626" y="350" width="27" height="28" fill="#e74c3c" rx="3"/>
  <rect x="653" y="350" width="87" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 83%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "홈런도 늘고 타율도 오르고 볼거리도 많아져서 팬들이 더 오는 거 맞음"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
