  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "전쟁으로 방산주 오르는 거 보면 복잡한 심정"</text>

