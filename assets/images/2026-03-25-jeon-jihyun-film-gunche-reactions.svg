<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">전지현 '군체' 복귀 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이트 연예 · 네이버 뉴스 | 2026-03-25 20:30 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이트 연예 — 긍정 520건 / 부정 22건 / 중립 88건</text>
  <rect x="60" y="110" width="561" height="28" fill="#27ae60" rx="3"/>
  <rect x="621" y="110" width="24" height="28" fill="#e74c3c" rx="3"/>
  <rect x="645" y="110" width="95" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 82%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "전지현 11년 만이라니... 드디어 스크린에서 본다!"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 기대감 압도적</text>
  <rect x="60" y="230" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="230" width="27" height="28" fill="#e74c3c" rx="3"/>
  <rect x="631" y="230" width="109" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 16%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "연상호 감독이면 기대된다, 부산행처럼 대박 나길"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">영화 커뮤니티 — 기대와 조심스러운 우려 혼재</text>
  <rect x="60" y="350" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="350" width="68" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="350" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 10%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "반도 이후라서... 기대 반 우려 반"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
