  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "자동차·반도체 다 건드리면 한국 경제 직격탄이다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">경제 커뮤니티 — 긍정 18건 / 부정 65건 / 중립 17건</text>
  <rect x="60" y="230" width="122" height="28" fill="#27ae60" rx="3"/>
  <rect x="182" y="230" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="624" y="230" width="116" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 18%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "트럼프는 믿을 수가 없다, 합의해도 또 뒤집는다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">수출업계 반응 — 긍정 20건 / 부정 60건 / 중립 20건</text>
