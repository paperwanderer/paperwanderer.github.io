  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 15건 / 부정 72건 / 중립 13건</text>
  <rect x="60" y="110" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="110" width="490" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="110" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 15%</text>
