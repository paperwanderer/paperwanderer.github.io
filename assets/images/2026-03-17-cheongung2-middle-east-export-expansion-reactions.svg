  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 기대 476건 / 우려 136건 / 중립 68건</text>
  <rect x="60" y="110" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="110" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68" height="28" fill="#95a5a6" rx="3"/>
