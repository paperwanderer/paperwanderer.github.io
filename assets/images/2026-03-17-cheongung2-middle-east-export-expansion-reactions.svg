  <text x="60" y="168" font-size="11" fill="#555">💬 "UAE에 이어 사우디까지 계약되면 한국 방산 진짜 메이저 됐다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 기대 408건 / 우려 204건 / 중립 68건</text>
  <rect x="60" y="230" width="408" height="28" fill="#27ae60" rx="3"/>
