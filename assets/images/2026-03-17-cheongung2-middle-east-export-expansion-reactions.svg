  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이란 전쟁이 청룡2 수출 기회가 됐다니 아이러니하지만 현실이다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 기대 476건 / 우려 136건 / 중립 68건</text>
