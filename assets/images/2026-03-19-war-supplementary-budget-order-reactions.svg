  <text x="60" y="168" font-size="11" fill="#555">💬 "중동 충격 실감난다 빨리 지원해야 서민 지금 힘들다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">경제 전문가 — 긍정 40건 / 부정 50건 / 중립 10건</text>
