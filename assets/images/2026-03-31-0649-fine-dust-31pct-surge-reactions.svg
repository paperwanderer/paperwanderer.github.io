<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">3월 미세먼지 급증 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 뉴스 댓글 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 에펨코리아: pos=10, neg=75, neu=15, total=100 -->
  <!-- pos_w=round(10/100*680)=68, neg_w=round(75/100*680)=510, neu_w=680-68-510=102 -->
  <!-- neg_x=60+68=128, neu_x=60+68+510=638 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 10건 / 부정 75건 / 중립 15건</text>
  <rect x="60"  y="110" width="68"  height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="510" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 75%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "숨 막히는 3월. 벚꽃 보러 나가고 싶은데 마스크 쓰고 보기 싫다"</text>

  <!-- 뉴스 댓글: pos=15, neg=70, neu=15, total=100 -->
  <!-- pos_w=round(15/100*680)=102, neg_w=round(70/100*680)=476, neu_w=680-102-476=102 -->
  <!-- neg_x=60+102=162, neu_x=60+102+476=638 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 15건 / 부정 70건 / 중립 15건</text>
  <rect x="60"  y="230" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="230" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "정부가 중국에 항의는 하는 건지. 매년 같은 이야기만 반복"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
