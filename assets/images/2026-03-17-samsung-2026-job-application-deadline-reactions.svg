  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "경제도 불안한데 삼성 들어가면 진짜 안정이다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">취업 커뮤니티 — 기대 408건 / 걱정 204건 / 중립 68건</text>
  <rect x="60" y="350" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="350" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "GSAT 준비하는데 세상은 다 무너지는 것 같다. 버텨야지"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
