  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 기대 340건 / 걱정 204건 / 중립 136건</text>
  <rect x="60" y="110" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="110" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "GSAT 막판 스퍼트 중. 이번엔 꼭 합격해야 한다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 기대 340건 / 걱정 272건 / 중립 68건</text>
  <rect x="60" y="230" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="230" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
