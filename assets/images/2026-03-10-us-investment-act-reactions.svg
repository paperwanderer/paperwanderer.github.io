  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "관세 전쟁에서 살아남으려면 어쩔 수 없다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 약 55% / 부정 약 35% / 중립 약 10%</text>
  <rect x="60" y="230" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="230" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "미국에 갖다 바치는 게 아니라 투자 수익이 돌아와야"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">진보 성향 커뮤니티 — 긍정 약 30% / 부정 약 55% / 중립 약 15%</text>
  <rect x="60" y="350" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="350" width="374" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "미 대법원도 위법 판결 냈는데 그냥 밀어붙이냐"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
