  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">전체 여론 — 긍정 45% / 부정 40% / 중립 15%</text>
  <rect x="60" y="110" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="110" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
