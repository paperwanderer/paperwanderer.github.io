<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">서해수호의날 채상병 묘역 참배 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 네이버뉴스 · 트위터/X | 2026-03-26 22:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 300건 / 부정 15건 / 중립 225건</text>
  <rect x="60" y="110" width="378" height="28" fill="#27ae60" rx="3"/>
  <rect x="438" y="110" width="19" height="28" fill="#e74c3c" rx="3"/>
  <rect x="457" y="110" width="283" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 56%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 3%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 41%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "'제자리를 찾아 다행'이라는 말이 채상병 특검 처리를 의미하는 것 같아 뭉클하다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 250건 / 부정 20건 / 중립 120건</text>
  <rect x="60" y="230" width="436" height="28" fill="#27ae60" rx="3"/>
  <rect x="496" y="230" width="35" height="28" fill="#e74c3c" rx="3"/>
  <rect x="531" y="230" width="209" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 64%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 31%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "어머니 생일도 챙겨달라고 했다는 말에 마음이 짠했다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">트위터/X — 긍정 180건 / 부정 10건 / 중립 320건</text>
  <rect x="60" y="350" width="240" height="28" fill="#27ae60" rx="3"/>
  <rect x="300" y="350" width="13" height="28" fill="#e74c3c" rx="3"/>
  <rect x="313" y="350" width="427" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 2%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 63%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "대통령이 직접 묘역에 가서 몸을 낮췄다는 게 의미 있다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>