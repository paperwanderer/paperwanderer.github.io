<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">지방선거 여당 46% vs 야당 30% 전망 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 디시인사이드 · 네이버 뉴스 | 2026-03-06 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 67건 / 부정 58건 / 중립 49건</text>
  <rect x="60" y="110" width="262" height="28" fill="#27ae60" rx="3"/>
  <rect x="322" y="110" width="227" height="28" fill="#e74c3c" rx="3"/>
  <rect x="549" y="110" width="191" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 39%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 33%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "민주 46%·국힘 21% 격차면 지방선거도 민주당 압승 구도"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 38건 / 부정 79건 / 중립 44건</text>
  <rect x="60" y="230" width="161" height="28" fill="#27ae60" rx="3"/>
  <rect x="221" y="230" width="334" height="28" fill="#e74c3c" rx="3"/>
  <rect x="555" y="230" width="185" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 24%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 49%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "야당 승리론이 30%밖에 안 된다는 게 국힘 현실"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 84건 / 부정 96건 / 중립 63건</text>
  <rect x="60" y="350" width="235" height="28" fill="#27ae60" rx="3"/>
  <rect x="295" y="350" width="269" height="28" fill="#e74c3c" rx="3"/>
  <rect x="564" y="350" width="176" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "지방선거까지 4개월도 안 남았는데 야당은 뭐하나"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>