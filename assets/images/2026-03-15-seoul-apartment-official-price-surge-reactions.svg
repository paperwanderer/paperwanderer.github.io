  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "집 하나 있는 사람도 세금 폭탄 맞으면 어쩌라는 건지"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 12건 / 부정 68건 / 중립 20건</text>
  <rect x="60" y="230" width="82" height="28" fill="#27ae60" rx="3"/>
  <rect x="142" y="230" width="462" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "공시가 올라도 집값은 떨어지지 않으니 허탈하다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">경제 커뮤니티 — 긍정 18건 / 부정 62건 / 중립 20건</text>
  <rect x="60" y="350" width="122" height="28" fill="#27ae60" rx="3"/>
  <rect x="182" y="350" width="422" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 18%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 62%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "종부세 기준선 다시 조정해야 한다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
