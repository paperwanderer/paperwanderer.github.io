  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 30건 / 부정 180건 / 중립 90건</text>
  <rect x="60" y="110" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="110" width="204" height="28" fill="#95a5a6" rx="3"/>
