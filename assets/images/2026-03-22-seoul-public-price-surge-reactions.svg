  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "세금 오른 거 월세로 다 전가하면 결국 세입자가 다 내는 구조"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 20건 / 부정 190건 / 중립 80건</text>
