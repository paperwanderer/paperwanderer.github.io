  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 7%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 64%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 29%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "원베일리 보유세 2855만원, 1천만원 더 내야 한다니"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">커뮤니티 종합 — 긍정 15건 / 부정 140건 / 중립 70건</text>
  <rect x="60" y="350" width="45" height="28" fill="#27ae60" rx="3"/>
  <rect x="105" y="350" width="425" height="28" fill="#e74c3c" rx="3"/>
  <rect x="530" y="350" width="210" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 7%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 62%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 31%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "강남 집값 오른 거 세금으로 잡겠다는 거, 효과는 의문"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
