  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "환율 1500원이면 수입 물가 얼마나 오를지 상상도 하기 싫다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">수출 기업 관련 — 엇갈린 시각</text>
  <rect x="60" y="230" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="230" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
