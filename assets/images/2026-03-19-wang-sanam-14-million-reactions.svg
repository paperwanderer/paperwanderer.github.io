<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">왕과 사는 남자 1400만 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이트 연예 · 루리웹 | 2026-03-19 16:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이트 연예 — 긍정 1,600건 / 부정 70건 / 중립 260건</text>
  <rect x="60" y="110" width="564" height="28" fill="#27ae60" rx="3"/>
  <rect x="624" y="110" width="25" height="28" fill="#e74c3c" rx="3"/>
  <rect x="649" y="110" width="91" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 83%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "이 영화 안 봤으면 두고두고 후회할 뻔. 단종 장면에서 진짜 울었다" (공감 723)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">루리웹 — 긍정 300건 / 부정 20건 / 중립 90건</text>
  <rect x="60" y="230" width="498" height="28" fill="#27ae60" rx="3"/>
  <rect x="558" y="230" width="33" height="28" fill="#e74c3c" rx="3"/>
  <rect x="591" y="230" width="149" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 73%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "신드롬이 맞다. 주변에 안 본 사람이 없음. 1500만도 무난히 갈 듯" (공감 187)</text>

  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>