  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "기다리고 기다리던 완전체 컴백. 군대 다녀와서 더 기대된다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">ARMY팬카페 — 긍정 230건 / 부정 5건 / 중립 20건</text>
  <rect x="60" y="230" width="612" height="28" fill="#27ae60" rx="3"/>
  <rect x="672" y="230" width="14" height="28" fill="#e74c3c" rx="3"/>
  <rect x="686" y="230" width="54" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 90%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 2%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 8%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "월드투어 일정 공개되면 바로 예매 전쟁 시작이다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 210건 / 부정 60건 / 중립 30건</text>
