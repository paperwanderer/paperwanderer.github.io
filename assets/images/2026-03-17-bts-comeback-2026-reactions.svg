  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 250건 / 부정 15건 / 중립 30건</text>
  <rect x="60" y="110" width="578" height="28" fill="#27ae60" rx="3"/>
  <rect x="638" y="110" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 85%</text>
