<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">이 대통령 채상병 묘역 참배 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">루리웹·경향신문 · X(트위터) | 2026-03-29 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
