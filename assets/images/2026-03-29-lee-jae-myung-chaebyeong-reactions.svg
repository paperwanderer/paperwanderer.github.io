  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- [루리웹·경향신문] bar_y=110, label_y=152, comment_y=168 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">루리웹·경향신문 댓글 — 긍정 150건 / 부정 120건 / 중립 80건</text>
  <rect x="60"  y="110" width="291" height="28" fill="#27ae60" rx="3"/>
  <rect x="351" y="110" width="233" height="28" fill="#e74c3c" rx="3"/>
  <rect x="584" y="110" width="156" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 43.0%</text>
