<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">미국-이란 전쟁 한국 경제 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">DC인사이드 · FM코리아 · 네이버뉴스 | 2026-03-03 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">DC인사이드 — 낙관 60건 / 비관 140건 / 중립 100건</text>
  <rect x="60" y="110" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="110" width="318" height="28" fill="#e74c3c" rx="3"/>
  <rect x="514" y="110" width="226" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 47%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 33%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "중동 에너지 70% 의존인데 호르무즈 막히면 진짜 끝장"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 낙관 40건 / 비관 120건 / 중립 80건</text>
  <rect x="60" y="230" width="114" height="28" fill="#27ae60" rx="3"/>
  <rect x="174" y="230" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="514" y="230" width="226" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 17%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 33%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "유가 100달러 가면 경제성장률 -0.3%p라니 소름"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 낙관 100건 / 비관 280건 / 중립 120건</text>
  <rect x="60" y="350" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="350" width="381" height="28" fill="#e74c3c" rx="3"/>
  <rect x="577" y="350" width="163" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 56%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 24%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "에너지 수입 다변화 안 해놓은 게 다 실수였네"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>