  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 우려 압도</text>
  <rect x="60" y="110" width="34" height="28" fill="#27ae60" rx="3"/>
  <rect x="94" y="110" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="536" y="110" width="204" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 5%</text>
