  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "5000t 구축함이면 북한 해군이 많이 성장했다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 종합 — 부정·우려 압도</text>
  <rect x="60" y="350" width="34" height="28" fill="#27ae60" rx="3"/>
  <rect x="94" y="350" width="456" height="28" fill="#e74c3c" rx="3"/>
  <rect x="550" y="350" width="190" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 5%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 67%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "미국 시선이 중동에 쏠린 상황에서 북한이 움직이는 건 계산된 것"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
