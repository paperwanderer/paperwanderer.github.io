  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "이란 전쟁 틈타서 또 도발이다. 패턴이 너무 예측 가능하다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">안보 커뮤니티 — 경각심 높음</text>
  <rect x="60" y="230" width="34" height="28" fill="#27ae60" rx="3"/>
  <rect x="94" y="230" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
