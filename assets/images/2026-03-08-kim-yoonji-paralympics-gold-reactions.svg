  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "19살 소녀가 역사를 썼다... 진짜 대단하다 ㅠㅠ"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 90건 / 부정 3건 / 중립 7건</text>
