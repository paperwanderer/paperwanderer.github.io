  <rect x="685" y="350" width="55" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 88%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 8%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "8년 만의 금메달, 특히 여자 선수 최초라 더 감격스럽다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
