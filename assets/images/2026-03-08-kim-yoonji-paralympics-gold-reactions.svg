  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 7%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "수영 선수에서 바이애슬론까지, 팔방미인 완전체"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">다음 — 긍정 88건 / 부정 4건 / 중립 8건</text>
