<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">한국 에너지 의존도 위기 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 오마이뉴스 | 2026-03-17 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 32건 / 부정 158건 / 중립 60건</text>
  <rect x="60" y="110" width="87" height="28" fill="#27ae60" rx="3"/>
  <rect x="147" y="110" width="430" height="28" fill="#e74c3c" rx="3"/>
  <rect x="577" y="110" width="163" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 13%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 63%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 24%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "에너지 자립도 높이는 게 안보인데 몇십 년째 제자리다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 28건 / 부정 140건 / 중립 57건</text>
  <rect x="60" y="230" width="85" height="28" fill="#27ae60" rx="3"/>
  <rect x="145" y="230" width="423" height="28" fill="#e74c3c" rx="3"/>
  <rect x="568" y="230" width="172" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 62%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "중동 하나 막히면 한국 경제 전체가 흔들린다는 게 공포다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">오마이뉴스 댓글 — 긍정 20건 / 부정 102건 / 중립 28건</text>
  <rect x="60" y="350" width="91" height="28" fill="#27ae60" rx="3"/>
  <rect x="151" y="350" width="463" height="28" fill="#e74c3c" rx="3"/>
  <rect x="614" y="350" width="126" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 13%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 19%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "재생에너지 전환에 지금이라도 속도를 내야 한다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
