  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 47%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "TSMC와의 수율 격차가 아직 크다. 삼성이 고객사 실제로 가져올 수 있을지 의문"</text>

