<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">리벨리온스 AI 반도체 투자 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 네이버뉴스 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 200건 / 부정 40건 / 중립 60건</text>
  <rect x="60" y="110" width="454" height="28" fill="#27ae60" rx="3"/>
  <rect x="514" y="110" width="90" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 67%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 13%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "드디어 한국도 엔비디아 대항마 키우는 거 맞지? 2500억이면 제대로 된 시작이다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 120건 / 부정 30건 / 중립 50건</text>
  <rect x="60" y="230" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="230" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "정부 직접 투자는 좋은데 리벨리온 NPU가 엔비디아 H100 대체 가능한지가 관건"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 160건 / 부정 35건 / 중립 65건</text>
  <rect x="60" y="350" width="415" height="28" fill="#27ae60" rx="3"/>
  <rect x="475" y="350" width="91" height="28" fill="#e74c3c" rx="3"/>
  <rect x="566" y="350" width="174" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 61%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 13%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "국민성장펀드 첫 직접 투자가 AI 반도체라는 게 의미 있음"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>