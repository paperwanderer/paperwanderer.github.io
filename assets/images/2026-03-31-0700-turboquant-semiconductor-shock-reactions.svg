<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <rect width="800" height="160" fill="#f8f9fa" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">커뮤니티 반응 온도계 — 터보퀀트 반도체 쇼크</text>
  <text x="400" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">집계 기준: 2026-03-31 07:00 KST | 총 반응 100건 추산</text>

  <!-- bar background -->
  <rect x="60" y="62" width="680" height="36" fill="#e0e0e0" rx="6"/>
  <!-- pos: 35/100 * 680 = 238 -->
  <rect x="60" y="62" width="238" height="36" fill="#4caf50" rx="6"/>
  <!-- neg: 45/100 * 680 = 306 -->
  <rect x="298" y="62" width="306" height="36" fill="#f44336"/>
  <!-- neu: 680 - 238 - 306 = 136 -->
  <rect x="604" y="62" width="136" height="36" fill="#9e9e9e" rx="6"/>

  <!-- labels on bar -->
  <text x="179" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">긍정 35%</text>
  <text x="451" y="85" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fff">부정 45%</text>
  <text x="672" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">중립 20%</text>

  <!-- bottom labels -->
  <text x="60" y="120" text-anchor="start" font-family="sans-serif" font-size="12" fill="#4caf50">👍 긍정 — 제번스 역설·장기 수요 증가</text>
  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f44336">👎 부정 — 주가 하락·패닉 셀링 우려</text>
  <text x="740" y="120" text-anchor="end" font-family="sans-serif" font-size="12" fill="#9e9e9e">💬 중립 — 상용화 지켜보자</text>

  <text x="400" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">출처: 네이버 뉴스·주식 커뮤니티 댓글 추산</text>
</svg>
