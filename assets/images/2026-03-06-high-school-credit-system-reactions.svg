<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">고교학점제 전면시행 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 디시인사이드 · 네이버 뉴스 | 2026-03-06 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 29건 / 부정 58건 / 중립 32건</text>
  <rect x="60" y="110" width="166" height="28" fill="#27ae60" rx="3"/>
  <rect x="226" y="110" width="332" height="28" fill="#e74c3c" rx="3"/>
  <rect x="558" y="110" width="182" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 24%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 49%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "방향은 맞는데 준비가 너무 안 된 채로 전면시행"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 21건 / 부정 63건 / 중립 27건</text>
  <rect x="60" y="230" width="129" height="28" fill="#27ae60" rx="3"/>
  <rect x="189" y="230" width="386" height="28" fill="#e74c3c" rx="3"/>
  <rect x="575" y="230" width="165" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 19%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 57%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 24%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "수능 체제랑 충돌하는 제도를 왜 밀어붙이는지 모르겠음"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 44건 / 부정 103건 / 중립 62건</text>
  <rect x="60" y="350" width="143" height="28" fill="#27ae60" rx="3"/>
  <rect x="203" y="350" width="335" height="28" fill="#e74c3c" rx="3"/>
  <rect x="538" y="350" width="202" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 21%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 49%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "교사 51%가 준비 부족이라는데 그대로 전면시행?"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>