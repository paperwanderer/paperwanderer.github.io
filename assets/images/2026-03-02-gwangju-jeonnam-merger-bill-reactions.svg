  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "광주전남이 뭉치면 수도권 쏠림 막을 수 있다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">타지역 커뮤니티 — 긍정 38건 / 부정 47건 / 중립 15건</text>
  <rect x="60" y="230" width="258" height="28" fill="#27ae60" rx="3"/>
  <rect x="318" y="230" width="320" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 38%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 47%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "왜 광주전남만 되고 대구경북은 안 되냐, 정치적 차별"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">포털 종합 — 긍정 55건 / 부정 28건 / 중립 17건</text>
