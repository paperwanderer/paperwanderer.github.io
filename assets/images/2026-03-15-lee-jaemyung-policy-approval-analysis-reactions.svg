  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "기름값 잡지 못하면서 무슨 개혁이냐"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 42건 / 부정 43건 / 중립 15건</text>
