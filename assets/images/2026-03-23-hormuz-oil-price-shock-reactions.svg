  <text x="60" y="168" font-size="11" fill="#555">💬 "기름값 올라서 다음달 공과금·교통비 다 오를 것 같아 무섭다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 50건 / 부정 168건 / 중립 201건</text>
