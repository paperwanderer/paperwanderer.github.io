  <text x="740" y="152" text-anchor="end" font-size="13" fill="#7f8c8d">중립 9%</text>
  <text x="60" y="168" font-size="13" fill="#555">💬 "멤버들이 모두 응원해줬다면 좋은 결정 (공감 456)"</text>
  <!-- Row 2 -->
  <text x="60" y="220" font-size="15" font-weight="bold" fill="#2c3e50">FM Korea (BTS ARIRANG) — 긍정 710건 / 부정 866건 / 중립 85건</text>
  <rect x="60" y="230" width="291" height="28" fill="#27ae60" rx="3"/>
