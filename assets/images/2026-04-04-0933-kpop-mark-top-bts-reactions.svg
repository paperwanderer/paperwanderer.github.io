<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#2c3e50">K-pop 4월 트렌드 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#7f8c8d">TheQoo, FM Korea | 2026-04-04 KST</text>
  <!-- 범례 -->
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="13" fill="#2c3e50">긍정</text>
