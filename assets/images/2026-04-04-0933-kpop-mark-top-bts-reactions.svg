  <text x="740" y="392" text-anchor="end" font-size="13" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="13" fill="#555">💬 "13년 만에 복귀하는 탑을 응원한다 (공감 378)"</text>
  <text x="400" y="426" text-anchor="middle" font-size="12" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
