  <!-- Row 1 -->
  <text x="60" y="100" font-size="15" font-weight="bold" fill="#2c3e50">TheQoo (마크 탈퇴) — 긍정 1166건 / 부정 401건 / 중립 145건</text>
  <rect x="60" y="110" width="463" height="28" fill="#27ae60" rx="3"/>
