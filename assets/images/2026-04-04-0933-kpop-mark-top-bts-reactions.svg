  <rect x="706" y="230" width="34" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="13" fill="#27ae60">긍정 43%</text>
  <text x="400" y="272" text-anchor="middle" font-size="13" fill="#e74c3c">부정 52%</text>
  <text x="740" y="272" text-anchor="end" font-size="13" fill="#7f8c8d">중립 5%</text>
  <text x="60" y="288" font-size="13" fill="#555">💬 "빌보드 동시 1위 달성은 대단하다 (공감 412)"</text>
  <!-- Row 3 -->
  <text x="60" y="340" font-size="15" font-weight="bold" fill="#2c3e50">TheQoo (탑 솔로앨범) — 긍정 680건 / 부정 309건 / 중립 248건</text>
  <rect x="60" y="350" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="350" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="13" fill="#27ae60">긍정 55%</text>
