<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">이란 호르무즈 통행료 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 네이버뉴스 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 20건 / 부정 190건 / 중립 80건</text>
  <rect x="60" y="110" width="47" height="28" fill="#27ae60" rx="3"/>
  <rect x="107" y="110" width="445" height="28" fill="#e74c3c" rx="3"/>
  <rect x="552" y="110" width="188" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 7%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "19세기 제국주의 시대 관행이 2026년에 부활하는 거 보고 있냐"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 15건 / 부정 160건 / 중립 60건</text>
  <rect x="60" y="230" width="43" height="28" fill="#27ae60" rx="3"/>
  <rect x="103" y="230" width="459" height="28" fill="#e74c3c" rx="3"/>
  <rect x="562" y="230" width="178" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 6%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "원유 70% 호르무즈 통과인데 물가 더 오르겠네"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 10건 / 부정 120건 / 중립 70건</text>
  <rect x="60" y="350" width="34" height="28" fill="#27ae60" rx="3"/>
  <rect x="94" y="350" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="502" y="350" width="238" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 5%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 35%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "위안화 결제 강요까지 나오면 국제 해운 질서 흔들리는 거 맞다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>