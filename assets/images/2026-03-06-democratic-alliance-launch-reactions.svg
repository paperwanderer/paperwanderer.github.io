  <text x="60" y="168" font-size="11" fill="#555">💬 "위성정당 또 만든다고? 이거 계속 반복이네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 38건 / 부정 54건 / 중립 29건</text>
