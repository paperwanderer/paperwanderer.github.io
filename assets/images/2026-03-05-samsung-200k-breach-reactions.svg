<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">삼성전자 20만원 붕괴 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버뉴스 · 주식 커뮤니티 | 2026-03-05 20:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 공황·손실 호소 압도</text>
  <rect x="60" y="110" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="510" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 75%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "20만원 넘었을 때 팔았어야 했다. 이제 어디까지 가나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">주식 커뮤니티 — 공황 매도 폭주</text>
  <rect x="60" y="230" width="81" height="28" fill="#27ae60" rx="3"/>
  <rect x="141" y="230" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="617" y="230" width="123" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "외국인들이 다 팔고 나가는데 개미들만 버티고 있는 꼴이다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 종합 — 공황·절망 압도</text>
  <rect x="60" y="350" width="74" height="28" fill="#27ae60" rx="3"/>
  <rect x="134" y="350" width="496" height="28" fill="#e74c3c" rx="3"/>
  <rect x="630" y="350" width="110" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 11%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 73%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 16%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "이란 전쟁이 이 정도 충격을 줄 줄 몰랐다. 한국 증시가 너무 취약하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>