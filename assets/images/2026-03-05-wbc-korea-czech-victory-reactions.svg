  <rect x="536" y="350" width="54" height="28" fill="#e74c3c" rx="3"/>
  <rect x="590" y="350" width="150" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "체코 상대지만 17년 만의 1차전 승리, 기분 좋다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
