  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "17년 만이라는 게 믿기지 않는다. 오늘만큼은 진짜 야구 대표팀 기대된다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 다수 / 비판 소수 / 중립</text>
  <rect x="60" y="230" width="558" height="28" fill="#27ae60" rx="3"/>
  <rect x="618" y="230" width="27" height="28" fill="#e74c3c" rx="3"/>
  <rect x="645" y="230" width="95" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 82%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "소형준 진짜 믿음직스럽다. 이번엔 다를 것 같다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">위키트리 댓글 — 긍정 우세</text>
