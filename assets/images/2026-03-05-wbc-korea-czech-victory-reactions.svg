  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 긍정 다수 / 부정 소수 / 중립</text>
  <rect x="60" y="110" width="530" height="28" fill="#27ae60" rx="3"/>
  <rect x="590" y="110" width="34" height="28" fill="#e74c3c" rx="3"/>
