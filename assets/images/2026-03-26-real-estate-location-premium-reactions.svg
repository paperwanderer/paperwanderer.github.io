  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 40건 / 부정 160건 / 중립 100건</text>
  <rect x="60" y="110" width="91" height="28" fill="#27ae60" rx="3"/>
  <rect x="151" y="110" width="363" height="28" fill="#e74c3c" rx="3"/>
  <rect x="514" y="110" width="226" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 13%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 53%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 34%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "이란전쟁에 환율 1500원인데 강남 아파트만 꿈쩍도 안 하네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 30건 / 부정 120건 / 중립 150건</text>
  <rect x="60" y="230" width="68" height="28" fill="#27ae60" rx="3"/>
