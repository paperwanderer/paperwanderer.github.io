  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 50%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "성수동이 이렇게 올랐을 줄은 몰랐다. 강남과 다른 종류의 프리미엄"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 30건 / 부정 100건 / 중립 170건</text>
