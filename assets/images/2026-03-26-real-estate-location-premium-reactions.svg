  <rect x="128" y="350" width="227" height="28" fill="#e74c3c" rx="3"/>
  <rect x="355" y="350" width="385" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 33%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 57%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "부동산은 진짜 계층 이동 불가능한 수준이 됐다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
