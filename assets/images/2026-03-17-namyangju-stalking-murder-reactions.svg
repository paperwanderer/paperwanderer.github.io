  <text x="60" y="288" font-size="11" fill="#555">💬 "피해자가 할 수 있는 모든 걸 했는데 국가가 실패했다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 공분/추모 476건 / 비판 136건 / 중립 68건</text>
