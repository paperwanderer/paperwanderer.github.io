  <text x="60" y="168" font-size="11" fill="#555">💬 "6번이나 신고했는데 결국 막지 못했다. 시스템이 완전히 실패한 것"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 공분/추모 544건 / 회의적 102건 / 중립 34건</text>
