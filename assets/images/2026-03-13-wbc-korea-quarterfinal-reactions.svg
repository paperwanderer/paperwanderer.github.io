<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">WBC 한국 8강 도미니카전 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 네이트스포츠 · 나무위키 | 2026-03-14 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 35건 / 부정 55건 / 중립 10건</text>
  <rect x="60" y="110" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="110" width="374" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "17년 만에 8강 진출 자체는 성과다, 결과는 아쉽지만"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이트스포츠 댓글 — 긍정 20건 / 부정 70건 / 중립 10건</text>
  <rect x="60" y="230" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="230" width="476" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 70%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "수준 차가 실화냐, 한국 야구 우물 안 개구리였다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">문화일보 댓글 — 긍정 30건 / 부정 50건 / 중립 20건</text>
  <rect x="60" y="350" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="350" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "류현진이 1.2이닝 3실점이라니, 마지막 등판이었나"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>