<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">엥겔계수 30% 돌파 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">포털 뉴스 · 커뮤니티 · 전문가 | 2026-03-19 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 공감 60건 / 정부비판 30건 / 중립 10건</text>
  <rect x="60" y="110" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="110" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "마트 갈 때마다 깜짝 놀란다 밥값이 제일 무섭다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 공감 50건 / 비판 40건 / 중립 10건</text>
  <rect x="60" y="230" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="230" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "라면으로 때우는 날이 늘었다 외식 진짜 못 가겠다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전문가·언론 — 구조적 문제 70건 / 일시적 현상 20건 / 중립 10건</text>
  <rect x="60" y="350" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="350" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "6년째 식품물가가 소비자물가 앞서는 건 구조적 문제"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>