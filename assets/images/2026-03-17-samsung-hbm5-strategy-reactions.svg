  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 30%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "D1c 수율만 잡히면 HBM 경쟁에서 다시 치고 올라갈 수 있겠다"</text>

