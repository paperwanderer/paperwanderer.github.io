  <text x="60" y="168" font-size="11" fill="#555">💬 "제주 벚꽃 오늘 터졌다, 주말 여행 바로 예약!" (좋아요 680)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 여행 댓글 — 긍정 540건 / 부정 30건 / 중립 130건</text>
