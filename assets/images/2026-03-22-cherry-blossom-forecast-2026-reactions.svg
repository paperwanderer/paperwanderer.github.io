  <text x="60" y="288" font-size="11" fill="#555">💬 "진해 군항제 3월 말이면 딱 맞겠다, 지금 숙소 잡아야 함" (공감 245)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 360건 / 부정 40건 / 중립 100건</text>
