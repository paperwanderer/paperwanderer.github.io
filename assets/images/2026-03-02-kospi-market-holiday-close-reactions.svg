<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">증시 휴장 연휴 후 전망 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">투자자커뮤니티 · 포털댓글 · 주식갤러리 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">투자자 커뮤니티 — 긍정 22건 / 부정 65건 / 중립 13건</text>
  <rect x="60" y="110" width="150" height="28" fill="#27ae60" rx="3"/>
  <rect x="210" y="110" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="110" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 22%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "연휴 끝나고 화요일 개장 때 어떻게 될지 긴장된다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 28건 / 부정 58건 / 중립 14건</text>
  <rect x="60" y="230" width="190" height="28" fill="#27ae60" rx="3"/>
  <rect x="250" y="230" width="394" height="28" fill="#e74c3c" rx="3"/>
  <rect x="644" y="230" width="96" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 28%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 58%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "트럼프 관세 뉴스 계속 나오면 화요일 시장은 롤러코스터"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">주식 갤러리 — 긍정 18건 / 부정 72건 / 중립 10건</text>
  <rect x="60" y="350" width="122" height="28" fill="#27ae60" rx="3"/>
  <rect x="182" y="350" width="490" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 18%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 72%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "연휴 쉬는 날이라 마음만 편하고 결국 화요일이 문제다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
