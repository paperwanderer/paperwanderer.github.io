  <text x="60" y="168" font-size="11" fill="#555">💬 "전쟁에 끼어들어 우리 군인들 목숨 걸게 할 이유가 없다" (비공감 196)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">오마이뉴스 커뮤니티 — 긍정 130건 / 부정 260건 / 중립 260건</text>
