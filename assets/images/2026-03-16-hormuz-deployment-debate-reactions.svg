  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 40%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "영국도 독일도 거부했는데 왜 한국이 나서야 하나" (공감 89)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 합산 — 긍정 340건 / 부정 680건 / 중립 520건</text>
