<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">월간남친 넷플릭스 글로벌 1위 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 연예 · 틱톡 · 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 연예 — 긍정 82건 / 부정 5건 / 중립 13건</text>
  <rect x="60" y="110" width="558" height="28" fill="#27ae60" rx="3"/>
  <rect x="618" y="110" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="110" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 82%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "지수 연기 너무 자연스러워서 놀랐음, 진짜 로코 여주 맞음"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">틱톡 — 긍정 85건 / 부정 3건 / 중립 12건</text>
  <rect x="60" y="230" width="578" height="28" fill="#27ae60" rx="3"/>
  <rect x="638" y="230" width="20" height="28" fill="#e74c3c" rx="3"/>
  <rect x="658" y="230" width="82" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 85%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 3%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "주요 클립 틱톡 수천만 조회, 지수 짤 퀄리티 미쳤다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">커뮤니티 — 긍정 78건 / 부정 8건 / 중립 14건</text>
  <rect x="60" y="350" width="530" height="28" fill="#27ae60" rx="3"/>
  <rect x="590" y="350" width="54" height="28" fill="#e74c3c" rx="3"/>
  <rect x="644" y="350" width="96" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 78%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 14%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "서인국이랑 케미 실화냐, 글로벌 1위 당연하지"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>