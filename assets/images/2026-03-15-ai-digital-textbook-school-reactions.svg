  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "아이가 태블릿으로 공부한다고 신나 했는데 걱정도 된다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 30건 / 부정 45건 / 중립 25건</text>
  <rect x="60" y="230" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="230" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "연수도 제대로 안 된 선생님들이 어떻게 가르치나"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">교사 커뮤니티 — 긍정 25건 / 부정 50건 / 중립 25건</text>
  <rect x="60" y="350" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="350" width="340" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="350" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 50%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "AI가 맞춤형으로 가르쳐주면 사교육비 줄 수도 있지 않을까"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
