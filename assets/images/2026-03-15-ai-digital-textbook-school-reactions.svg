  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">학부모 커뮤니티 — 긍정 35건 / 부정 40건 / 중립 25건</text>
  <rect x="60" y="110" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="110" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="110" width="170" height="28" fill="#95a5a6" rx="3"/>
