<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">2026 KBO 개막 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 스포츠 · 야구 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 네이버 스포츠: pos=70, neg=20, neu=10, total=100 -->
  <!-- pos_w=round(70/100*680)=476, neg_w=round(20/100*680)=136, neu_w=680-476-136=68 -->
  <!-- neg_x=60+476=536, neu_x=60+476+136=672 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 스포츠 댓글 — 긍정 70건 / 부정 20건 / 중립 10건</text>
  <rect x="60"  y="110" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="110" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68"  height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "개막전부터 매진이라니 야구 인기 정말 식을 줄 모른다"</text>

  <!-- 야구 커뮤니티: pos=65, neg=25, neu=10, total=100 -->
  <!-- pos_w=round(65/100*680)=442, neg_w=round(25/100*680)=170, neu_w=680-442-170=68 -->
  <!-- neg_x=60+442=502, neu_x=60+442+170=672 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">야구 커뮤니티 — 긍정 65건 / 부정 25건 / 중립 10건</text>
  <rect x="60"  y="230" width="442" height="28" fill="#27ae60" rx="3"/>
  <rect x="502" y="230" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68"  height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 65%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 25%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "시범경기 44만이 정규시즌으로 이어진다. 올해 1000만 간다"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
