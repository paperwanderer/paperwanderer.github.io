<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">개학 연기 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">학부모커뮤니티 · 학생 · 맞벌이부모 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">학부모 커뮤니티 — 긍정 48건 / 부정 40건 / 중립 12건</text>
  <rect x="60" y="110" width="326" height="28" fill="#27ae60" rx="3"/>
  <rect x="386" y="110" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="658" y="110" width="82" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 48%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "아이도 좋아하고 우리도 연휴 하루 더 쉬어서 좋다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">학생 반응 — 긍정 80건 / 부정 8건 / 중립 12건</text>
  <rect x="60" y="230" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="230" width="54" height="28" fill="#e74c3c" rx="3"/>
  <rect x="658" y="230" width="82" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "하루 더 쉬어서 너무 좋다, 개학 최대한 미뤄줘"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">맞벌이 부모 — 긍정 20건 / 부정 65건 / 중립 15건</text>
  <rect x="60" y="350" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="350" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "맞벌이라서 하루 더 쉬는 게 오히려 곤란하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
