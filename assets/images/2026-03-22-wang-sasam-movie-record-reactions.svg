  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "단종이라는 인물을 이렇게 따뜻하게 그릴 수 있다니, 감독 진심 느껴짐"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버영화 — 긍정 350건 / 부정 25건 / 중립 50건</text>
