  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 280건 / 부정 30건 / 중립 40건</text>
  <rect x="60" y="110" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="110" width="58" height="28" fill="#e74c3c" rx="3"/>
