  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 더쿠 · 네이버영화 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
