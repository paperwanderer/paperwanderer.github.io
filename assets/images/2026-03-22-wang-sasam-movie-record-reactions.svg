  <text x="60" y="168" font-size="11" fill="#555">💬 "유해진 진짜 이 영화 찍으려고 태어난 거 같음, 매출 1위 당연"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 200건 / 부정 20건 / 중립 30건</text>
