  <text x="60" y="168" font-size="11" fill="#555">💬 "19살에 패럴림픽 금메달이라니 정말 놀라운 선수다" (공감 446)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">스포츠 커뮤니티 — 긍정 560건 / 부정 46건 / 중립 274건</text>
