  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">DC인사이드 실베 — 긍정 250건 / 부정 380건 / 중립 370건</text>
  <rect x="60" y="110" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="110" width="258" height="28" fill="#e74c3c" rx="3"/>
  <rect x="488" y="110" width="252" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 38%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 37%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "싱글벙글 지금 까이는 이유 - 조작감 이상하고 스토리 부실하다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 400건 / 부정 120건 / 중립 180건</text>
  <rect x="60" y="230" width="389" height="28" fill="#27ae60" rx="3"/>
  <rect x="449" y="230" width="117" height="28" fill="#e74c3c" rx="3"/>
  <rect x="566" y="230" width="174" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 57%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 17%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "오픈월드 퀄리티는 진짜 미쳤다. 전투도 익숙해지면 재밌음"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">스팀(국내 리뷰) — 긍정 720건 / 부정 200건 / 중립 280건</text>
  <rect x="60" y="350" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="350" width="113" height="28" fill="#e74c3c" rx="3"/>
  <rect x="581" y="350" width="159" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 17%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "8년 기다렸는데 진짜 기대 이상. 조작감은 패치로 개선됐으면"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
