  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "창문 열었다가 바로 닫았다. 뿌옇더라"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">건강 커뮤니티 — 긍정 25건 / 부정 50건 / 중립 25건</text>
