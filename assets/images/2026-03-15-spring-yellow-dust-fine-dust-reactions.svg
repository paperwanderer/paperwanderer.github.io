  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "봄만 되면 황사…마스크 또 챙겨야 하나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 20건 / 부정 55건 / 중립 25건</text>
