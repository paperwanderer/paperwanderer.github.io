  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">일반 커뮤니티 — 긍정 15건 / 부정 60건 / 중립 25건</text>
  <rect x="60" y="110" width="102" height="28" fill="#27ae60" rx="3"/>
