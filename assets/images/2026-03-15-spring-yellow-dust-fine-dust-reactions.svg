  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">일반 커뮤니티 · 네이버 뉴스 · 건강 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
