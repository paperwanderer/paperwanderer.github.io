  <rect x="685" y="230" width="55" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 84%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 8%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "소설 2번 읽었는데 로키 시각화가 제일 기대된다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버영화 — 긍정 140건 / 부정 15건 / 중립 14건</text>
