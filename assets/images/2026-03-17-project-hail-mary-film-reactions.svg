  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 9%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "라이언 고슬링 이 영화로 아카데미 노미네이트 확정각"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 200건 / 부정 20건 / 중립 20건</text>
  <rect x="60" y="230" width="568" height="28" fill="#27ae60" rx="3"/>
