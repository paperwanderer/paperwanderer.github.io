  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 240건 / 부정 25건 / 중립 25건</text>
  <rect x="60" y="110" width="555" height="28" fill="#27ae60" rx="3"/>
