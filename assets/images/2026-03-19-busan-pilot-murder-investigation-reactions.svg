  <text x="60" y="168" font-size="11" fill="#555">💬 "3년을 준비한 살인, 이미 정상이 아니다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 애도 15건 / 공분 80건 / 중립 5건</text>
