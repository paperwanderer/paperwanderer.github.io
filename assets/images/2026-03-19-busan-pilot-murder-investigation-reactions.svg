  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 5%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "직장 갈등이 이렇게까지 갈 수 있다니 충격적"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전문가·제도 논의 — 제도개선 60건 / 비판 30건 / 중립 10건</text>
