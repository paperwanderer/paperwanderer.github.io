  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "문보경 11타점 대회 전체 1위ㄷㄷ 진짜 해결사네" (공감 156)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">한국경제 댓글 — 긍정 52건 / 부정 20건 / 중립 28건</text>
