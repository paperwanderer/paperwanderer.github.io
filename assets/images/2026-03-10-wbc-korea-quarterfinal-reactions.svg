  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "17년 만이다... 진짜 기적이네 도쿄의 기적" (공감 312)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">뉴스1 댓글 — 긍정 78건 / 부정 5건 / 중립 17건</text>
  <rect x="60" y="230" width="530" height="28" fill="#27ae60" rx="3"/>
