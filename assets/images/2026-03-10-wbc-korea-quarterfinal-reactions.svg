  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 28%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "경우의 수 뚫고 올라왔다, 이제 마이애미서 제대로 보여주자" (공감 89)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
