<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">부산 여행지 1위 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">뉴스 댓글 · 여행 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 뉴스 댓글: pos=60, neg=20, neu=20, total=100 -->
  <!-- pos_w=round(60/100*680)=408, neg_w=round(20/100*680)=136, neu_w=680-408-136=136 -->
  <!-- neg_x=60+408=468, neu_x=60+408+136=604 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 60건 / 부정 20건 / 중립 20건</text>
  <rect x="60"  y="110" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="110" width="136" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 20%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "부산 맛집·야경 진짜 세계 최고 수준. 외국인들이 왜 좋아하는지 알겠다"</text>

  <!-- 여행 커뮤니티: pos=55, neg=25, neu=20, total=100 -->
  <!-- pos_w=round(55/100*680)=374, neg_w=round(25/100*680)=170, neu_w=680-374-170=136 -->
  <!-- neg_x=60+374=434, neu_x=60+374+170=604 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">여행 커뮤니티 — 긍정 55건 / 부정 25건 / 중립 20건</text>
  <rect x="60"  y="230" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="230" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 25%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "일본 관광객들 부산 맛집 투어 컨텐츠가 유튜브에 폭발적으로 늘었음"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
