  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 12%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "광화문 공연 예매 경쟁 어마어마하겠는데"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 294건 / 부정 52건 / 중립 97건</text>
