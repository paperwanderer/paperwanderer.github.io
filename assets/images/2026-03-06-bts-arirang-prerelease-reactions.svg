  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "3년 9개월 공백 뒤에 400만 선주문이면 BTS 건재함"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 162건 / 부정 31건 / 중립 58건</text>
