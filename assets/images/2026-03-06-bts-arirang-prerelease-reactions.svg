  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 66%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 12%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "군 복무 마치고 완전체로 돌아오는 거 진짜 기대된다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
