<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">카타르 LNG 공급 위기 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 클리앙 · 네이버뉴스댓글 | 2026-03-20 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 90건 / 부정(우려) 380건 / 중립 130건</text>
  <rect x="60" y="110" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="110" width="431" height="28" fill="#e74c3c" rx="3"/>
  <rect x="593" y="110" width="147" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 63%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 22%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "LNG 수입량 15% 끊기면 전기요금 어떻게 되는 거야. 가스비도 오를 텐데"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 70건 / 부정 290건 / 중립 90건</text>
  <rect x="60" y="230" width="106" height="28" fill="#27ae60" rx="3"/>
  <rect x="166" y="230" width="438" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 16%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 64%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "호르무즈 해협 봉쇄 실제 시나리오는 한국 경제 최악의 악몽"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스댓글 — 긍정 80건 / 부정 410건 / 중립 110건</text>
  <rect x="60" y="350" width="91" height="28" fill="#27ae60" rx="3"/>
  <rect x="151" y="350" width="465" height="28" fill="#e74c3c" rx="3"/>
  <rect x="616" y="350" width="124" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 13%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 19%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "재생에너지로 전환 안 하면 이런 충격은 계속 반복된다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>