  <text x="60" y="168" font-size="11" fill="#555">💬 "로키 때문에 감정선이 확 살아난다. 외계생명체가 이렇게 따뜻하게 표현될 수 있다니" (공감 312)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">나무위키·다음카페 — 긍정 420건 / 부정 18건 / 중립 62건</text>
