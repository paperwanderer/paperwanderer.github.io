  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "후반으로 갈수록 진짜 좋아진다. 초반 지루함만 견디면 올해 최고의 SF" (공감 245)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">CGV 골든에그 — 긍정 990건 / 부정 5건 / 중립 5건</text>
