<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">BTS 아리랑 컴백 화제 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 더쿠 · 트위터 | 2026-03-08 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 90건 / 부정 3건 / 중립 7건</text>
  <rect x="60" y="110" width="612" height="28" fill="#27ae60" rx="3"/>
  <rect x="672" y="110" width="20" height="28" fill="#e74c3c" rx="3"/>
  <rect x="692" y="110" width="48" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 90%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 3%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 7%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "드디어 완전체다... 기다린 보람이 있다 ㅠㅠ"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 92건 / 부정 2건 / 중립 6건</text>
  <rect x="60" y="230" width="626" height="28" fill="#27ae60" rx="3"/>
  <rect x="686" y="230" width="14" height="28" fill="#e74c3c" rx="3"/>
  <rect x="700" y="230" width="40" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 92%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 2%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 6%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "아리랑이라는 제목에서 이미 소름... 타이틀 대박 예감"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">트위터(X) — 긍정 88건 / 부정 4건 / 중립 8건</text>
  <rect x="60" y="350" width="598" height="28" fill="#27ae60" rx="3"/>
  <rect x="658" y="350" width="27" height="28" fill="#e74c3c" rx="3"/>
  <rect x="685" y="350" width="55" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 88%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 4%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 8%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "광화문 공연 넷플릭스 독점 중계, 전 세계 ARMY 다 본다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>