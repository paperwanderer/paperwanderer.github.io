<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">배달앱 수수료 인상 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">자영업자 커뮤니티 · 소비자 커뮤니티 · 네이버 뉴스 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">자영업자 커뮤니티 — 긍정 10건 / 부정 75건 / 중립 15건</text>
  <rect x="60" y="110" width="68" height="28" fill="#27ae60" rx="3"/>
  <rect x="128" y="110" width="510" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 10%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 75%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "남 좋은 일만 시키고 있다. 수수료 떼면 남는 게 없다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">소비자 커뮤니티 — 긍정 20건 / 부정 60건 / 중립 20건</text>
  <rect x="60" y="230" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="230" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "배달 끊고 포장만 받을까 고민 중"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 15건 / 부정 65건 / 중립 20건</text>
  <rect x="60" y="350" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="350" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "그래도 배달앱 없으면 가게 홍보도 못 한다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>