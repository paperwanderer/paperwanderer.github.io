<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">구글 터보퀀트 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 뉴스 댓글 · 투자자 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- [네이버 뉴스 댓글] bar_y=110, pos=35, neg=45, neu=20, total=100 -->
  <!-- pos_w=round(35/100*680)=238, neg_w=round(45/100*680)=306, neu_w=680-238-306=136 -->
  <!-- neg_x=60+238=298, neu_x=60+238+306=604 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 35건 / 부정 45건 / 중립 20건</text>
  <rect x="60"  y="110" width="238" height="28" fill="#27ae60" rx="3"/>
  <rect x="298" y="110" width="306" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 35%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 45%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "제번스 역설 — 싸지면 더 쓴다. 주가 빠질 때 담아야"</text>

  <!-- [투자자 커뮤니티] bar_y=230, pos=45, neg=35, neu=20, total=100 -->
  <!-- pos_w=round(45/100*680)=306, neg_w=round(35/100*680)=238, neu_w=680-306-238=136 -->
  <!-- neg_x=60+306=366, neu_x=60+306+238=604 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">투자자 커뮤니티 — 긍정 45건 / 부정 35건 / 중립 20건</text>
  <rect x="60"  y="230" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="230" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "HBM 수요 자체가 줄어드는 게 아니라는 게 핵심"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
