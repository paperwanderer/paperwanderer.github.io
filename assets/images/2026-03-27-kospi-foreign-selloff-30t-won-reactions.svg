<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">외국인 30조 순매도 / 개미 수급전쟁 — 반응 분석</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">투자 커뮤니티 · 전문가 반응 | 2026-03-27 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">투자 커뮤니티 — 긍정 50% / 부정 32% / 중립 18%</text>
  <rect x="60" y="110" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="110" width="218" height="28" fill="#e74c3c" rx="3"/>
  <rect x="618" y="110" width="122" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 32%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "외국인이 던지면 줍는다 — 이럴 때 사는 게 개미 전략"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">전문가 / 증권사 — 긍정 40% / 부정 35% / 중립 25%</text>
  <rect x="60" y="230" width="272" height="28" fill="#27ae60" rx="3"/>
  <rect x="332" y="230" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 40%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이번 주 외국인 순매도 10조원 초과 — 매도 강도 매우 높다"</text>

  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>