<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">코스피 폭락 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버뉴스 · 클리앙 · 시사저널e | 2026-03-05 21:00 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 저가매수론 vs 패닉</text>
  <rect x="60" y="110" width="190" height="28" fill="#27ae60" rx="3"/>
  <rect x="250" y="110" width="354" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 28%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 52%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "삼성전자 20만원 깨졌다. 이게 말이 되냐. 진짜 2008년이 오나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 손실 공유 중심</text>
  <rect x="60" y="230" width="150" height="28" fill="#27ae60" rx="3"/>
  <rect x="210" y="230" width="394" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 22%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 58%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "노후자금 ETF 30% 녹았다. 전쟁이 이렇게까지 길어질 줄 몰랐다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 종합 — 부정(공포) 우세</text>
  <rect x="60" y="350" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="350" width="374" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 55%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "방산주만 웃는다. S오일 28% 올랐다니까 진짜 기막히다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
