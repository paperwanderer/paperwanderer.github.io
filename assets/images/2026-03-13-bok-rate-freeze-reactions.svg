  <rect x="500" y="230" width="240" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 26%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 38%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 36%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "호르무즈 위기에 환율까지 불안한데 금리 인하는 당분간 없겠다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">FM코리아 — 긍정 220건 / 부정 280건 / 중립 180건</text>
