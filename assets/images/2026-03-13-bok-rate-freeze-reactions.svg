  <rect x="560" y="350" width="180" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 32%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 41%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "집값 더 오를까봐 동결한 거 같은데 실제 민생은 갈수록 쪼들려"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
