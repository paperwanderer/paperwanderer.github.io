  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 200건 / 부정 300건 / 중립 180건</text>
  <rect x="60" y="110" width="200" height="28" fill="#27ae60" rx="3"/>
  <rect x="260" y="110" width="300" height="28" fill="#e74c3c" rx="3"/>
  <rect x="560" y="110" width="180" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 29%</text>
