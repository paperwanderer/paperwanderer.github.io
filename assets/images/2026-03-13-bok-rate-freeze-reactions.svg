  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "금리 인하도 못 하면 부동산 대출 이자 언제까지 버텨야 하나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">클리앙 — 긍정 180건 / 부정 260건 / 중립 240건</text>
  <rect x="60" y="230" width="180" height="28" fill="#27ae60" rx="3"/>
