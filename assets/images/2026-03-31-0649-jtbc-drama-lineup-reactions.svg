<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">JTBC 드라마 라인업 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">더쿠 · 연예 커뮤니티 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 더쿠: pos=70, neg=15, neu=15, total=100 -->
  <!-- pos_w=round(70/100*680)=476, neg_w=round(15/100*680)=102, neu_w=680-476-102=102 -->
  <!-- neg_x=60+476=536, neu_x=60+476+102=638 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 70건 / 부정 15건 / 중립 15건</text>
  <rect x="60"  y="110" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="110" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "구교환 고윤정 조합 예상 못 했는데 너무 기대됨. 박해영 작가 믿고 보는 중"</text>

  <!-- 연예 커뮤니티: pos=68, neg=17, neu=15, total=100 -->
  <!-- pos_w=round(68/100*680)=462, neg_w=round(17/100*680)=116, neu_w=680-462-116=102 -->
  <!-- neg_x=60+462=522, neu_x=60+462+116=638 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">연예 커뮤니티 — 긍정 68건 / 부정 17건 / 중립 15건</text>
  <rect x="60"  y="230" width="462" height="28" fill="#27ae60" rx="3"/>
  <rect x="522" y="230" width="116" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="230" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 68%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 17%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "구교환 전성시대가 시작됐다. 올해 작품만 세 편 이상이라고?"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
