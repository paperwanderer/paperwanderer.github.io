<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">학폭 대입 반영 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 네이버 뉴스 · 더쿠 | 2026-03-22 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 520건 / 부정 80건 / 중립 100건</text>
  <rect x="60" y="110" width="505" height="28" fill="#27ae60" rx="3"/>
  <rect x="565" y="110" width="78" height="28" fill="#e74c3c" rx="3"/>
  <rect x="643" y="110" width="97" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 74%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 11%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "학폭하고 명문대 가는 게 당연했던 게 비정상이었던 거" (공감 280)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 680건 / 부정 70건 / 중립 100건</text>
  <rect x="60" y="230" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="230" width="56" height="28" fill="#e74c3c" rx="3"/>
  <rect x="660" y="230" width="80" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "서울대 11개교 150명 중 150명 탈락, 당연한 결과다" (공감 445)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">더쿠(theqoo) — 긍정 340건 / 부정 60건 / 중립 100건</text>
  <rect x="60" y="350" width="462" height="28" fill="#27ae60" rx="3"/>
  <rect x="522" y="350" width="82" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 68%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 12%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "피해자는 평생 상처인데 가해자는 대학도 잘 가면 되냐" (공감 198)</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>