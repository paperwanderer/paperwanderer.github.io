  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "천궁-Ⅱ 실전 성과가 UAE 원유 확보로 이어진 게 신기함"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 31건 / 부정 82건 / 중립 29건</text>
  <rect x="60" y="230" width="149" height="28" fill="#27ae60" rx="3"/>
  <rect x="209" y="230" width="393" height="28" fill="#e74c3c" rx="3"/>
  <rect x="602" y="230" width="138" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 22%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 58%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "한국 원유 70%가 중동산인데 호르무즈 막히면 진짜 큰일"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 62건 / 부정 154건 / 중립 73건</text>
  <rect x="60" y="350" width="146" height="28" fill="#27ae60" rx="3"/>
  <rect x="206" y="350" width="362" height="28" fill="#e74c3c" rx="3"/>
  <rect x="568" y="350" width="172" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 21%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 53%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "교민 대피 잘 됐지만 원유 수급 장기화 걱정됨"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
