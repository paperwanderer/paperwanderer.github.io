  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 12건 / 부정 240건 / 중립 148건</text>
  <rect x="60" y="110" width="20" height="28" fill="#27ae60" rx="3"/>
  <rect x="80" y="110" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="488" y="110" width="252" height="28" fill="#95a5a6" rx="3"/>
