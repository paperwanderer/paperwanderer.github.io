  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 37%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "포장도 이제 수수료다. 자영업자들 어디서 숨 쉬라는 거냐"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 10건 / 부정 220건 / 중립 170건</text>
