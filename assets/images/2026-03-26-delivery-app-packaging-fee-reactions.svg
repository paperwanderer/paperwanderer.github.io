  <rect x="74" y="350" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="244" y="350" width="496" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 2%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 25%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 73%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "배달앱 다 독점 아니냐. 이건 규제가 필요하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
