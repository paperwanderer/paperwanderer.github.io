  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 43%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이란전쟁에 환율도 올랐는데 수수료까지 올린다고. 다음 달 문 닫는 가게 늘어날 것"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">트위터/X — 긍정 8건 / 부정 100건 / 중립 292건</text>
