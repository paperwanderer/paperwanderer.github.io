<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">주택경기 지수 급락 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">부동산 커뮤니티 · 뉴스 댓글 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 부동산 커뮤니티: pos=15, neg=60, neu=25, total=100 -->
  <!-- pos_w=round(15/100*680)=102, neg_w=round(60/100*680)=408, neu_w=680-102-408=170 -->
  <!-- neg_x=60+102=162, neu_x=60+102+408=570 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">부동산 커뮤니티 — 긍정 15건 / 부정 60건 / 중립 25건</text>
  <rect x="60"  y="110" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="110" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="110" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "금리 올라가고 유가 올라가고 집값까지 빠지면 영끌한 사람들 어떻게 되나"</text>

  <!-- 뉴스 댓글: pos=15, neg=60, neu=25, total=100 -->
  <!-- pos_w=102, neg_w=408, neu_w=170 -->
  <!-- neg_x=162, neu_x=570 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 15건 / 부정 60건 / 중립 25건</text>
  <rect x="60"  y="230" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="230" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "부동산 시장이 전쟁 리스크까지 반영하기 시작했다"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
