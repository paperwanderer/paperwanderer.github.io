  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "역대급 사극 영화다. 1,500만까지 간다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">씨네플레이 — 긍정 75건 / 부정 8건 / 중립 17건</text>
  <rect x="60" y="230" width="510" height="28" fill="#27ae60" rx="3"/>
  <rect x="570" y="230" width="54" height="28" fill="#e74c3c" rx="3"/>
  <rect x="624" y="230" width="116" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 75%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 8%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "배우들 연기력이 진짜 역대급, 주연 다 오스카 감이다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 영화 — 긍정 85건 / 부정 5건 / 중립 10건</text>
  <rect x="60" y="350" width="578" height="28" fill="#27ae60" rx="3"/>
  <rect x="638" y="350" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="350" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 85%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "1,500만 넘을 것 같다. 역대 매출 1위가 될 수도"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
