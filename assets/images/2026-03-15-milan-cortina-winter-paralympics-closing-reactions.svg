<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">동계패럴림픽 한국 역대최고 13위 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">네이버 스포츠 · X(트위터) · 오마이스타 | 2026-03-15~16 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 스포츠 — 긍정 80건 / 부정 5건 / 중립 15건</text>
  <rect x="60" y="110" width="544" height="28" fill="#27ae60" rx="3"/>
  <rect x="604" y="110" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="110" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 80%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "김윤지 선수 메달 5개 진짜 대단하다, 세계 최고 선수네"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">X(트위터) — 긍정 75건 / 부정 5건 / 중립 20건</text>
  <rect x="60" y="230" width="510" height="28" fill="#27ae60" rx="3"/>
  <rect x="570" y="230" width="34" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 75%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 5%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "김윤지 선수 5관왕이라니 믿기지 않는 성과"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">오마이스타 — 긍정 70건 / 부정 10건 / 중립 20건</text>
  <rect x="60" y="350" width="476" height="28" fill="#27ae60" rx="3"/>
  <rect x="536" y="350" width="68" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="350" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 70%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 10%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "패럴림픽 이렇게 좋은 성적 낸 적 처음인 것 같아, 감동적"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>