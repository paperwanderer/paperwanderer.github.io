  <rect x="544" y="350" width="196" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 12%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 59%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 29%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "증권사들이 신용 중단하는 게 위기 신호인 줄 알았어야 했는데"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
