  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 31%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "빚내서 주식 사는 사람들 이번에 진짜 피 봤겠다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 19건 / 부정 76건 / 중립 43건</text>
  <rect x="60" y="230" width="94" height="28" fill="#27ae60" rx="3"/>
  <rect x="154" y="230" width="375" height="28" fill="#e74c3c" rx="3"/>
  <rect x="529" y="230" width="211" height="28" fill="#95a5a6" rx="3"/>
