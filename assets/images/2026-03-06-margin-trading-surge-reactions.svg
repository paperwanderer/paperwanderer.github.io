  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 31%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "신용융자 32조면 언제 터지냐는 게 관건이었는데 터졌네"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 31건 / 부정 146건 / 중립 72건</text>
