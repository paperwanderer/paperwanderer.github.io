  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 29건 / 부정 98건 / 중립 57건</text>
  <rect x="60" y="110" width="107" height="28" fill="#27ae60" rx="3"/>
  <rect x="167" y="110" width="362" height="28" fill="#e74c3c" rx="3"/>
  <rect x="529" y="110" width="211" height="28" fill="#95a5a6" rx="3"/>
