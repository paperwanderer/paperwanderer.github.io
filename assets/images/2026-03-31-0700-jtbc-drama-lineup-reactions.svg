<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <rect width="800" height="120" fill="#f9f9f9" rx="8"/>
  <text x="400" y="22" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#333" font-weight="bold">커뮤니티 반응</text>
  <!-- 긍정 -->
  <rect x="60" y="35" width="442" height="32" fill="#4caf50" rx="4"/>
  <!-- 부정 -->
  <rect x="502" y="35" width="68" height="32" fill="#f44336" rx="4"/>
  <!-- 중립 -->
  <rect x="570" y="35" width="170" height="32" fill="#9e9e9e" rx="4"/>
  <!-- 레이블 -->
  <text x="60" y="88" text-anchor="start" font-size="12" font-family="sans-serif" fill="#4caf50" font-weight="bold">긍정 65%</text>
  <text x="400" y="88" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#f44336" font-weight="bold">부정 10%</text>
  <text x="740" y="88" text-anchor="end" font-size="12" font-family="sans-serif" fill="#9e9e9e" font-weight="bold">중립 25%</text>
  <text x="60" y="106" text-anchor="start" font-size="11" font-family="sans-serif" fill="#666">"출연진 믿보배" 기대</text>
  <text x="400" y="106" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#666">"제목이 너무 길다"</text>
  <text x="740" y="106" text-anchor="end" font-size="11" font-family="sans-serif" fill="#666">방영 후 지켜보겠다</text>
</svg>
