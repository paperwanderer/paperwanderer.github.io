  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "피해자가 더 있을 수 있다니 소름. 빨리 진상 밝혀야 한다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 처벌촉구 476건 / 논란 136건 / 중립 68건</text>
