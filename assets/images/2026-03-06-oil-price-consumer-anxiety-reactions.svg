  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 27%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "주유소 기름값 이제 리터당 2300원 넘었음 진짜 힘들다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 18건 / 부정 76건 / 중립 32건</text>
