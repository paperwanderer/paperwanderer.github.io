  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 26%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "중동전쟁 장기화되면 전기요금도 올라갈 것 같아서 불안"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 34건 / 부정 167건 / 중립 72건</text>
