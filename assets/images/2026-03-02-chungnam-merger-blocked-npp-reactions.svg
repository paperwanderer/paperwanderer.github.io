<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">대전·충남 통합 제동 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">포털댓글 · 대전/충남커뮤니티 · 정치커뮤니티 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 25건 / 부정 62건 / 중립 13건</text>
  <rect x="60" y="110" width="170" height="28" fill="#27ae60" rx="3"/>
  <rect x="230" y="110" width="422" height="28" fill="#e74c3c" rx="3"/>
  <rect x="652" y="110" width="88" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 25%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 62%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 13%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "광주전남은 되는데 대전충남은 왜 안 되냐"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">대전/충남 커뮤니티 — 긍정 30건 / 부정 52건 / 중립 18건</text>
  <rect x="60" y="230" width="204" height="28" fill="#27ae60" rx="3"/>
  <rect x="264" y="230" width="354" height="28" fill="#e74c3c" rx="3"/>
  <rect x="618" y="230" width="122" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 30%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 52%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "주민 동의 없이 밀어붙이면 안 된다는 점은 동의"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">정치 커뮤니티 — 긍정 20건 / 부정 68건 / 중립 12건</text>
  <rect x="60" y="350" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="350" width="462" height="28" fill="#e74c3c" rx="3"/>
  <rect x="658" y="350" width="82" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 68%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "여야가 지역 발전을 정치 도구로 쓰고 있다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>