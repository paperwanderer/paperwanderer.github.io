  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 11%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 29%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "법안이 계류된 게 몇 년째야, 실행이 중요하지 선언이 중요한 게 아니다"</text>

  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
