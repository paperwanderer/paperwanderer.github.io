  <!-- 네이버뉴스 bar_y=110 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 댓글 — 긍정 348건 / 부정 89건 / 중립 63건</text>
  <rect x="60" y="110" width="473" height="28" fill="#27ae60" rx="3"/>
  <rect x="533" y="110" width="121" height="28" fill="#e74c3c" rx="3"/>
