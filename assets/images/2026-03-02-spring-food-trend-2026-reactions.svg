  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "카페마다 딸기 메뉴 없는 곳이 없다, 다 먹어볼 예정"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
