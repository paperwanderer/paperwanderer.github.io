  <text x="60" y="168" font-size="11" fill="#555">💬 "봄나물 비빔밥 해 먹었는데 진짜 봄이 왔다는 게 느껴진다"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">포털 뉴스 댓글 — 긍정 62건 / 부정 22건 / 중립 16건</text>
