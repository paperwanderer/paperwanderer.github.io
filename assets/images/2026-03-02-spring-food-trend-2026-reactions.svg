  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">SNS 반응 — 긍정 75건 / 부정 10건 / 중립 15건</text>
  <rect x="60" y="110" width="510" height="28" fill="#27ae60" rx="3"/>
