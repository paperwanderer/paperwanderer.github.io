  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">SNS · 포털댓글 · 요리커뮤니티 | 2026-03-02 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
