  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 16%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "봄나물 가격이 너무 올랐다, 예전만 못하다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">요리 커뮤니티 — 긍정 80건 / 부정 8건 / 중립 12건</text>
