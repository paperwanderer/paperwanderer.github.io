  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 연예 댓글 — 긍정 1,400건 / 부정 350건 / 중립 350건</text>
  <rect x="60" y="110" width="453" height="28" fill="#27ae60" rx="3"/>
  <rect x="513" y="110" width="113" height="28" fill="#e74c3c" rx="3"/>
  <rect x="626" y="110" width="114" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 67%</text>
