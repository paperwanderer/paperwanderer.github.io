  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 16%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "아리랑 무대에서 눈물 났다, 군대 다녀와서 이런 무대 선물해줘 고마워"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">오마이뉴스 댓글 — 긍정 260건 / 부정 480건 / 중립 160건</text>
  <rect x="60" y="230" width="196" height="28" fill="#27ae60" rx="3"/>
  <rect x="256" y="230" width="363" height="28" fill="#e74c3c" rx="3"/>
  <rect x="619" y="230" width="121" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 29%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 53%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 18%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "BTS 팬이어도 공공 공간에서 집회 막은 건 잘못됐다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 450건 / 부정 150건 / 중립 200건</text>
  <rect x="60" y="350" width="382" height="28" fill="#27ae60" rx="3"/>
  <rect x="442" y="350" width="128" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="350" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 56%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 19%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "공연은 좋았는데 관객 수 뻥튀기 논란은 이해 안 됨"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
