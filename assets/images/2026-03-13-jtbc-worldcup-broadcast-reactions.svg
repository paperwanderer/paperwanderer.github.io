<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">JTBC 월드컵 중계권 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">나무위키 · 스포츠경향 · 온라인 커뮤니티 | 2026-03-13 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 지상파 무료 기대 55건 / JTBC 독점 반발 35건 / 중립 10건</text>
  <rect x="60" y="110" width="374" height="28" fill="#27ae60" rx="3"/>
  <rect x="434" y="110" width="238" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="110" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 55%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 35%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "월드컵은 지상파로 봐야 한다. 빨리 합의해라"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">스포츠 커뮤니티 — 기대 50건 / 반발 40건 / 중립 10건</text>
  <rect x="60" y="230" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="230" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="672" y="230" width="68" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 10%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "1,900억 내고 지상파에 주는 게 말이 되냐, JTBC만 보면 된다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">미디어 커뮤니티 — 기대 45건 / 반발 40건 / 중립 15건</text>
  <rect x="60" y="350" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="350" width="272" height="28" fill="#e74c3c" rx="3"/>
  <rect x="638" y="350" width="102" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 40%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 15%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "중계권 사둔 JTBC 입장에서 지상파 요구가 너무 가혹하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>