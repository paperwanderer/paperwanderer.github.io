  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 댓글 — 긍정 260건 / 부정 420건 / 중립 150건</text>
  <rect x="60" y="110" width="210" height="28" fill="#27ae60" rx="3"/>
  <rect x="270" y="110" width="340" height="28" fill="#e74c3c" rx="3"/>
