  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 40%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "2020년에 문재인 정부 때도 했고 선거제도를 왜 안 바꾸나" (비공감 126)</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">전체 합산 — 긍정 420건 / 부정 680건 / 중립 440건</text>
