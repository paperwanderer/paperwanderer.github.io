  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 19%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "여야 다 꼼수인 거 알면서 왜 이 짓을 반복하나 선거제도 고쳐야 한다" (비공감 198)</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">DC/오마이 커뮤니티 — 긍정 160건 / 부정 260건 / 중립 290건</text>
