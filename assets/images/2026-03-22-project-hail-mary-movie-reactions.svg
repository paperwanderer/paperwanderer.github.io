  <text x="60" y="168" font-size="11" fill="#555">💬 "라이언 고슬링 SF 영화인데 원작 팬으로서 완벽한 캐스팅이라 생각함"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">더쿠 — 긍정 82건 / 부정 6건 / 중립 12건</text>
