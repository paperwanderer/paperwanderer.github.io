  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 12%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "눈물 줄줄 흘리면서 봤다 로키와 라이언의 우정 파트 진짜 최고"</text>

