  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 19%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "주유소들 벌써 기름값 올릴 준비하는 거 다 보임"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">디시인사이드 — 긍정 8건 / 부정 61건 / 중립 18건</text>
