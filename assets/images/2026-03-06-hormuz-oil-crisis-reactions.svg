  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 12건 / 부정 89건 / 중립 24건</text>
  <rect x="60" y="110" width="65" height="28" fill="#27ae60" rx="3"/>
