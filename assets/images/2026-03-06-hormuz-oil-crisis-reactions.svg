  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 21%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "한국 에너지 자립도 진짜 심각함, 이래서 원전 필요한 거"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 15건 / 부정 134건 / 중립 32건</text>
