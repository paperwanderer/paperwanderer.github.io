<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">코스피·코스닥 서킷브레이커 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 블라인드 · 네이버 뉴스 | 2026-03-12 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 35건 / 부정 65건 / 중립 20건</text>
  <rect x="60" y="110" width="198" height="28" fill="#27ae60" rx="3"/>
  <rect x="258" y="110" width="368" height="28" fill="#e74c3c" rx="3"/>
  <rect x="626" y="110" width="114" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 29%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 54%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 17%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "서킷브레이커 터졌다 ㄷㄷ 역대 최대 폭락 중동발 직격탄"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">블라인드 — 긍정 20건 / 부정 80건 / 중립 25건</text>
  <rect x="60" y="230" width="109" height="28" fill="#27ae60" rx="3"/>
  <rect x="169" y="230" width="435" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 16%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 64%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "퇴직연금도 다 날아가게 생겼네... 이게 뭔 상황"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 25건 / 부정 90건 / 중립 35건</text>
  <rect x="60" y="350" width="113" height="28" fill="#27ae60" rx="3"/>
  <rect x="173" y="350" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="581" y="350" width="159" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 17%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 23%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "원달러 1500원 가나... 중동 전쟁 하나가 한국 경제 다 흔드네"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>