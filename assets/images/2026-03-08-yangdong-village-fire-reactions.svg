<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">경주 양동마을 화재 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">에펨코리아 · 네이버뉴스 · 다음뉴스 | 2026-03-08 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">에펨코리아 — 긍정 20건 / 부정 10건 / 중립 70건</text>
  <rect x="60" y="110" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="110" width="68" height="28" fill="#e74c3c" rx="3"/>
  <rect x="264" y="110" width="476" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 10%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 70%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "인명 피해가 없어 다행, 화재 원인은 빨리 밝혀야"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버뉴스 — 긍정 15건 / 부정 15건 / 중립 70건</text>
  <rect x="60" y="230" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="230" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="264" y="230" width="476" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 70%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "세계유산 구역 내 화재... 문화재 관리 시스템 재검토해야"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">다음뉴스 — 긍정 18건 / 부정 12건 / 중립 70건</text>
  <rect x="60" y="350" width="122" height="28" fill="#27ae60" rx="3"/>
  <rect x="182" y="350" width="82" height="28" fill="#e74c3c" rx="3"/>
  <rect x="264" y="350" width="476" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 18%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 12%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 70%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "양동마을 문화재 방화 시스템 점검이 시급하다"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>