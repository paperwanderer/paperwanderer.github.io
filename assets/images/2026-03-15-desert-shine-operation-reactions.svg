<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="440" fill="#f8f9fa" rx="12"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">사막의 빛 작전 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">일반 커뮤니티 · 네이버 뉴스 · 안보 커뮤니티 | 2026-03-15 KST</text>
  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">일반 커뮤니티 — 긍정 50건 / 부정 25건 / 중립 25건</text>
  <rect x="60" y="110" width="340" height="28" fill="#27ae60" rx="3"/>
  <rect x="400" y="110" width="170" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="110" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="152" text-anchor="start" font-size="11" fill="#27ae60">긍정 50%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 25%</text>
  <text x="740" y="152" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "원유 97%를 수입하는 나라가 호르무즈 안 지키면 뭘 지키나"</text>

  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">네이버 뉴스 — 긍정 45건 / 부정 30건 / 중립 25건</text>
  <rect x="60" y="230" width="306" height="28" fill="#27ae60" rx="3"/>
  <rect x="366" y="230" width="204" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="230" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="272" text-anchor="start" font-size="11" fill="#27ae60">긍정 45%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 30%</text>
  <text x="740" y="272" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "이란 자극 안 하면서 조용히 할 수 있으면 좋겠다"</text>

  <text x="60" y="340" font-size="13" font-weight="bold" fill="#2c3e50">안보 커뮤니티 — 긍정 60건 / 부정 15건 / 중립 25건</text>
  <rect x="60" y="350" width="408" height="28" fill="#27ae60" rx="3"/>
  <rect x="468" y="350" width="102" height="28" fill="#e74c3c" rx="3"/>
  <rect x="570" y="350" width="170" height="28" fill="#95a5a6" rx="3"/>
  <text x="60" y="392" text-anchor="start" font-size="11" fill="#27ae60">긍정 60%</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#e74c3c">부정 15%</text>
  <text x="740" y="392" text-anchor="end" font-size="11" fill="#7f8c8d">중립 25%</text>
  <text x="60" y="408" font-size="11" fill="#555">💬 "괜히 중동 분쟁에 발 담그는 거 아닌가"</text>

  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>