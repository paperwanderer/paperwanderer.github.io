<svg xmlns="http://www.w3.org/2000/svg" width="800" height="322" viewBox="0 0 800 322"
     font-family="'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif">
  <rect width="800" height="322" fill="#f8f9fa" rx="12"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">이란 전쟁·유가 급등 — 커뮤니티 반응</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#7f8c8d">온라인 커뮤니티 · 뉴스 댓글 | 2026-03-31 06:49 KST</text>

  <rect x="490" y="66" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="506" y="77" font-size="11" fill="#2c3e50">긍정</text>
  <rect x="548" y="66" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="564" y="77" font-size="11" fill="#2c3e50">부정</text>
  <rect x="606" y="66" width="12" height="12" fill="#95a5a6" rx="2"/>
  <text x="622" y="77" font-size="11" fill="#2c3e50">중립</text>

  <!-- 온라인커뮤니티: pos=15, neg=65, neu=20, total=100 -->
  <!-- pos_w=round(15/100*680)=102, neg_w=round(65/100*680)=442, neu_w=680-102-442=136 -->
  <!-- neg_x=60+102=162, neu_x=60+102+442=604 -->
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#2c3e50">온라인 커뮤니티 — 긍정 15건 / 부정 65건 / 중립 20건</text>
  <rect x="60"  y="110" width="102" height="28" fill="#27ae60" rx="3"/>
  <rect x="162" y="110" width="442" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="110" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="152" text-anchor="start"  font-size="11" fill="#27ae60">긍정 15%</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#e74c3c">부정 65%</text>
  <text x="740" y="152" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="168" font-size="11" fill="#555">💬 "주유소 1,900원? 이미 2,000원 넘은 곳 있다. 월급은 그대론데"</text>

  <!-- 뉴스 댓글: pos=20, neg=60, neu=20, total=100 -->
  <!-- pos_w=round(20/100*680)=136, neg_w=round(60/100*680)=408, neu_w=680-136-408=136 -->
  <!-- neg_x=60+136=196, neu_x=60+136+408=604 -->
  <text x="60" y="220" font-size="13" font-weight="bold" fill="#2c3e50">뉴스 댓글 — 긍정 20건 / 부정 60건 / 중립 20건</text>
  <rect x="60"  y="230" width="136" height="28" fill="#27ae60" rx="3"/>
  <rect x="196" y="230" width="408" height="28" fill="#e74c3c" rx="3"/>
  <rect x="604" y="230" width="136" height="28" fill="#95a5a6" rx="3"/>
  <text x="60"  y="272" text-anchor="start"  font-size="11" fill="#27ae60">긍정 20%</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#e74c3c">부정 60%</text>
  <text x="740" y="272" text-anchor="end"    font-size="11" fill="#7f8c8d">중립 20%</text>
  <text x="60" y="288" font-size="11" fill="#555">💬 "외식값도 오르고 주유값도 오르고 도대체 어디서 끊나"</text>

  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#bdc3c7">* 수치는 집계된 공감/반응 신호 기반 추산 | paperWanderer</text>
</svg>
